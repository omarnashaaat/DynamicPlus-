            const [isSaving, setIsSaving] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState('idle');
            const [dataLoaded, setDataLoaded] = useState(false);
            const [appLoading, setAppLoading] = useState(true);

            useEffect(() => {
                // Simulate initial app loading
                const timer = setTimeout(() => setAppLoading(false), 2000);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Initial fetch from localStorage and backend
            useEffect(() => {
                const loadLocalData = () => {
                    try {
                        const localEmps = localStorage.getItem('hr_employees');
                        const localAtt = localStorage.getItem('hr_attendance');
                        const localShifts = localStorage.getItem('hr_shifts');
                        const localRules = localStorage.getItem('hr_attendance_rules');
                        const localInsurance = localStorage.getItem('hr_insurance');
                        const localContracts = localStorage.getItem('hr_contracts');
                        const localPayroll = localStorage.getItem('hr_payroll');
                        const localCalendar = localStorage.getItem('hr_calendar');
                        const localResignations = localStorage.getItem('hr_resignations');

                        if (localEmps) setEmployees(JSON.parse(localEmps));
                        if (localAtt) setAttendanceLog(JSON.parse(localAtt));
                        if (localShifts) setShifts(JSON.parse(localShifts));
                        if (localRules) setAttendanceRules(JSON.parse(localRules));
                        if (localInsurance) setInsuranceRecords(JSON.parse(localInsurance));
                        if (localContracts) setContractRecords(JSON.parse(localContracts));
                        if (localPayroll) setPayrollRecords(JSON.parse(localPayroll));
                        if (localCalendar) setCalendarEvents(JSON.parse(localCalendar));
                        if (localResignations) setResignations(JSON.parse(localResignations));
                    } catch (err) {
                        console.error('Failed to load local data:', err);
                    }
                };

                loadLocalData();

                if (isOnline && !dataLoaded) {
                    const fetchData = async () => {
                        try {
                            const [empRes, attRes, setRes] = await Promise.all([
                                fetch('/api/employees').catch(() => null),
                                fetch('/api/attendance').catch(() => null),
                                fetch('/api/settings').catch(() => null)
                            ]);
                            
                            if (empRes && empRes.ok) {
                                const emps = await empRes.json();
                                if (emps.length > 0) setEmployees(emps);
                            }
                            if (attRes && attRes.ok) {
                                const att = await attRes.json();
                                if (Object.keys(att).length > 0) setAttendanceLog(att);
                            }
                            if (setRes && setRes.ok) {
                                const settings = await setRes.json();
                                if (settings.shifts) setShifts(settings.shifts);
                                if (settings.attendance_rules) setAttendanceRules(settings.attendance_rules);
                                if (settings.insurance) setInsuranceRecords(settings.insurance);
                                if (settings.contracts) setContractRecords(settings.contracts);
                                if (settings.payroll) setPayrollRecords(settings.payroll);
                                if (settings.calendar) setCalendarEvents(settings.calendar);
                                if (settings.resignations) setResignations(settings.resignations);
                            }
                        } catch (err) {
                            console.error('Failed to fetch initial data from backend:', err);
                        } finally {
                            setDataLoaded(true);
                        }
                    };
                    fetchData();
                } else {
                    setDataLoaded(true);
                }
            }, [isOnline, dataLoaded]);

            // Auto-Backup System
            useEffect(() => {
                const createBackup = () => {
                    const backupData = {
                        timestamp: new Date().toISOString(),
                        employees,
                        attendanceLog,
                        insuranceRecords,
                        contractRecords,
                        payrollRecords,
                        calendarEvents,
                        resignations,
                        shifts,
                        attendanceRules
                    };
                    const backups = JSON.parse(localStorage.getItem('hr_backups') || '[]');
                    backups.unshift(backupData);
                    // Keep only last 10 backups
                    localStorage.setItem('hr_backups', JSON.stringify(backups.slice(0, 10)));
                    console.log('Auto-backup created at:', backupData.timestamp);
                };

                const backupInterval = setInterval(createBackup, 10 * 60 * 1000); // Every 10 minutes
                return () => clearInterval(backupInterval);
            }, [employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents, resignations, shifts, attendanceRules]);

            // Sync to backend (if online)
            useEffect(() => {
                if (!isOnline || !dataLoaded) return;

                const sync = async () => {
                    setSyncStatus('syncing');
                    try {
                        const res = await Promise.all([
                            fetch('/api/employees', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ employees })
                            }).catch(() => ({ ok: false })),
                            fetch('/api/attendance', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ attendance: attendanceLog })
                            }).catch(() => ({ ok: false })),
                            fetch('/api/settings', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    settings: {
                                        shifts,
                                        attendance_rules: attendanceRules,
                                        insurance: insuranceRecords,
                                        contracts: contractRecords,
                                        payroll: payrollRecords,
                                        calendar: calendarEvents,
                                        resignations
                                    }
                                })
                            }).catch(() => ({ ok: false }))
                        ]);
                        
                        if (res.every(r => r.ok)) {
                            setSyncStatus('idle');
                        } else {
                            setSyncStatus('error');
                        }
                    } catch (err) {
                        console.error('Sync failed:', err);
                        setSyncStatus('error');
                    }
                };

                const timer = setTimeout(sync, 5000);
                return () => clearTimeout(timer);
            }, [isOnline, employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents, shifts, attendanceRules, resignations]);

            // Keyboard Navigation Logic
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const active = document.activeElement;
                    if (!active || !['INPUT', 'SELECT', 'TEXTAREA'].includes(active.tagName)) return;

                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const form = active.closest('form') || document;
                        const focusable = Array.from(form.querySelectorAll('input, select, textarea, button')).filter(el => !el.disabled && el.tabIndex !== -1);
                        const index = focusable.indexOf(active);
                        if (index > -1 && index < focusable.length - 1) {
                            focusable[index + 1].focus();
                        }
                    }

                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        const cell = active.closest('td');
                        if (!cell) return;
                        const row = cell.parentElement;
                        const table = row.closest('table');
                        const colIndex = Array.from(row.children).indexOf(cell);
                        const rowIndex = Array.from(table.querySelectorAll('tbody tr')).indexOf(row);

                        if (e.key === 'ArrowDown') {
                            const nextRow = table.querySelectorAll('tbody tr')[rowIndex + 1];
                            if (nextRow) nextRow.children[colIndex].querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowUp') {
                            const prevRow = table.querySelectorAll('tbody tr')[rowIndex - 1];
                            if (prevRow) prevRow.children[colIndex].querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowRight') {
                            const nextCell = row.children[colIndex - 1];
                            if (nextCell) nextCell.querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowLeft') {
                            const prevCell = row.children[colIndex + 1];
                            if (prevCell) prevCell.querySelector('input, select')?.focus();
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                const save = () => {
                    localStorage.setItem('hr_isLoggedIn', isLoggedIn);
                    localStorage.setItem('hr_username', username);
                    localStorage.setItem('hr_employees', JSON.stringify(employees));
                    localStorage.setItem('hr_insurance', JSON.stringify(insuranceRecords));
                    localStorage.setItem('hr_contracts', JSON.stringify(contractRecords));
                    localStorage.setItem('hr_attendance', JSON.stringify(attendanceLog));
                    localStorage.setItem('hr_payroll', JSON.stringify(payrollRecords));
                    localStorage.setItem('hr_calendar', JSON.stringify(calendarEvents));
                    localStorage.setItem('hr_resignations', JSON.stringify(resignations));
                    localStorage.setItem('hr_shifts', JSON.stringify(shifts));
                    localStorage.setItem('hr_attendance_rules', JSON.stringify(attendanceRules));
                    
                    setIsSaving(true);
                    const timer = setTimeout(() => setIsSaving(false), 1500);
                    return () => clearTimeout(timer);
                };
                save();
            }, [isLoggedIn, employees, insuranceRecords, contractRecords, attendanceLog, payrollRecords, calendarEvents, shifts, attendanceRules]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);


            const addEmployee = (d) => {
                if (employees.some(e => e.code === d.code)) {
                    showToast('هذا الكود مستخدم بالفعل لموظف آخر', 'error');
                    return;
                }
                setEmployees([...employees, { ...d, id: Date.now().toString(), status: 'نشط', totalLeaves: 21, monthlyLeaves: Array(12).fill(0) }]);
                addActivity(`تم إضافة موظف جديد: ${d.name}`, 'user-plus');
            };
            const bulkAddEmployees = (list) => {
                // Filter out duplicates from the incoming list and against existing employees
                const existingCodes = new Set(employees.map(e => e.code));
                const uniqueNew = [];
                const seenInList = new Set();
                
                for (const emp of list) {
                    if (!existingCodes.has(emp.code) && !seenInList.has(emp.code)) {
                        uniqueNew.push(emp);
                        seenInList.add(emp.code);
                    }
                }
                
                if (uniqueNew.length === 0) {
                    showToast('لم يتم إضافة أي موظف جديد (أكواد مكررة)', 'warning');
                    return;
                }
                
                setEmployees(p => [...p, ...uniqueNew]);
                addActivity(`تم استيراد ${uniqueNew.length} موظف`, 'upload');
                if (uniqueNew.length < list.length) {
                    showToast(`تم استيراد ${uniqueNew.length} موظف، وتجاهل ${list.length - uniqueNew.length} مكررين`, 'warning');
                }
            };
            const updateEmployee = (u) => {
                if (employees.some(e => e.code === u.code && e.id !== u.id)) {
                    showToast('هذا الكود مستخدم بالفعل لموظف آخر', 'error');
                    return;
                }
                setEmployees(employees.map(e => e.id === u.id ? { ...e, ...u } : e));
                addActivity(`تحديث بيانات الموظف: ${u.name}`, 'edit');
            };
            const deleteEmployee = (id) => {
                const emp = employees.find(e => e.id === id);
                setEmployees(employees.filter(e => e.id !== id));
                if (emp) addActivity(`حذف الموظف: ${emp.name}`, 'user-minus');
            };

            const handleRestore = (data) => {
                if (data.employees) setEmployees(data.employees);
                if (data.attendanceLog) setAttendanceLog(data.attendanceLog);
                if (data.insuranceRecords) setInsuranceRecords(data.insuranceRecords);
                if (data.contractRecords) setContractRecords(data.contractRecords);
                if (data.payrollRecords) setPayrollRecords(data.payrollRecords);
                if (data.calendarEvents) setCalendarEvents(data.calendarEvents);
                if (data.resignations) setResignations(data.resignations);
                if (data.shifts) setShifts(data.shifts);
            };

            const handleClear = () => {
                askConfirm('مسح كافة البيانات؟', 'تحذير: هل أنت متأكد من مسح كافة بيانات النظام نهائياً؟ لا يمكن التراجع عن هذه الخطوة.', () => {
                    setEmployees([]);
                    setAttendanceLog({});
                    setInsuranceRecords({});
                    setContractRecords({});
                    setPayrollRecords({});
                    setCalendarEvents([]);
                    setResignations([]);
                    setShifts(INITIAL_SHIFTS);
                    showToast('تم مسح كافة البيانات بنجاح.', 'warning');
                });
            };

            const formattedDate = currentTime.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const formattedTime = currentTime.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            if (appLoading) return <LoadingScreen />;

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50 font-['Cairo'] selection:bg-indigo-100" dir="rtl">
                        <div className="max-w-md w-full p-10 rounded-[50px] text-center border shadow-2xl bg-white border-slate-200 animate-scale-in">
                            <div className="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-xl rotate-3">
                                <Icon name="shield-check" size={40} />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2">المنسق HR</h1>
                            <p className="text-slate-400 mb-10 font-bold uppercase tracking-widest text-[10px]">نظام إدارة الموارد البشرية المتكامل</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1 text-right">
                                    <label className="text-[10px] font-black text-slate-400 uppercase mr-4">اسم المستخدم</label>
                                    <input 
                                        required 
                                        type="text" 
                                        placeholder="أدخل اسم المستخدم" 
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-slate-800 font-bold focus:outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all" 
                                        value={loginData.user} 
                                        onChange={(e) => setLoginData(prev => ({ ...prev, user: e.target.value }))} 
                                    />
                                </div>
                                <div className="space-y-1 text-right">
                                    <label className="text-[10px] font-black text-slate-400 uppercase mr-4">كلمة المرور</label>
                                    <input 
                                        required 
                                        type="password" 
                                        placeholder="••••••••" 
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl py-4 px-6 text-slate-800 font-bold focus:outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all" 
                                        value={loginData.pass} 
                                        onChange={(e) => setLoginData(prev => ({ ...prev, pass: e.target.value }))} 
                                    />
                                </div>
                                
                                {loginError && (
                                    <div className="bg-rose-50 text-rose-600 p-4 rounded-2xl text-xs font-bold animate-shake">
                                        {loginError}
                                    </div>
                                )}

                                <button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-lg flex items-center justify-center gap-3 hover:bg-indigo-700 active:scale-95 transition-all mt-4">
                                    دخول النظام <Icon name="log-in" size={20} />
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col desktop-container px-6 py-8">
                    {activeTab !== 'dashboard' && (
                        <div className="mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 no-print bg-white p-6 rounded-[35px] border border-slate-100 shadow-sm animate-slide-up">
                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                <button onClick={() => setActiveTab('dashboard')} className="w-12 h-12 flex items-center justify-center bg-slate-900 text-white rounded-2xl hover:bg-indigo-600 transition-all shadow-lg shadow-slate-200 group">
                                    <Icon name="arrow-right" size={20} className="group-hover:translate-x-1 transition-transform" />
                                </button>
                                <div>
                                    <h2 className="text-xl font-black text-slate-800 capitalize">{activeTab.replace('_', ' ')}</h2>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">نظام الموارد البشرية / {activeTab}</p>
                                </div>
                            </div>
                            
                            <div className="w-full sm:w-auto flex items-center justify-between sm:justify-start gap-6">
                                <div className="hidden md:flex items-center gap-3 px-4 py-2 bg-slate-50 rounded-2xl border border-slate-100">
                                    <div className="w-8 h-8 rounded-lg bg-white flex items-center justify-center text-indigo-600 shadow-sm"><Icon name="users" size={16} /></div>
                                    <span className="text-xs font-black text-slate-600">{employees.length} موظف</span>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-xl shadow-slate-200">
                                    <div className="flex flex-col text-right leading-tight">
                                        <span className="text-[11px] font-bold opacity-70">{formattedDate}</span>
                                        <span className="text-[13px] font-black font-mono">{formattedTime}</span>
                                    </div>
                                    <div className="w-px h-6 bg-white/20"></div>
                                    <div className={`w-3 h-3 rounded-full ${isOnline ? 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.5)]' : 'bg-rose-400 shadow-[0_0_10px_rgba(248,113,113,0.5)]'}`}></div>
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1">
                        {activeTab === 'dashboard' ? (
                            <Dashboard setActiveTab={setActiveTab} userName={username || "المدير"} employees={employees} attendanceLog={attendanceLog} setIsLoggedIn={setIsLoggedIn} isOnline={isOnline} syncStatus={syncStatus} recentActivity={recentActivity} showToast={showToast} />
                        ) : activeTab === 'employees' ? (
                            <EmployeeTable employees={employees} onAddEmployee={(d) => { addEmployee(d); showToast('تم إضافة الموظف بنجاح'); }} onUpdateEmployee={(u) => { updateEmployee(u); showToast('تم تحديث البيانات'); }} onDeleteEmployee={(id) => { deleteEmployee(id); showToast('تم حذف الموظف', 'error'); }} onBulkAdd={bulkAddEmployees} setActiveTab={setActiveTab} shifts={shifts} showToast={showToast} askConfirm={askConfirm} />
                        ) : activeTab === 'attendance' ? (
                            <Attendance employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} shifts={shifts} rules={attendanceRules} showToast={showToast} />
                        ) : activeTab === 'monthly_report' ? (
                            <MonthlyReport employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} shifts={shifts} rules={attendanceRules} showToast={showToast} />
                        ) : activeTab === 'attendance_rules' ? (
                            <AttendanceRules rules={attendanceRules} setRules={setAttendanceRules} showToast={showToast} />
                        ) : activeTab === 'payroll' ? (
                            <Payroll employees={employees} payrollRecords={payrollRecords} setPayrollRecords={setPayrollRecords} attendanceLog={attendanceLog} insuranceRecords={insuranceRecords} setActiveTab={setActiveTab} rules={attendanceRules} showToast={showToast} />
                        ) : activeTab === 'recruitment' ? (
                            <Recruitment employees={employees} showToast={showToast} askConfirm={askConfirm} />
                        ) : activeTab === 'ats' ? (
                            <ATS employees={employees} showToast={showToast} />
                        ) : activeTab === 'calendar' ? (
                            <Calendar employees={employees} calendarEvents={calendarEvents} setCalendarEvents={setCalendarEvents} showToast={showToast} />
                        ) : activeTab === 'archive' ? (
                            <Archive employees={employees} showToast={showToast} />
                        ) : activeTab === 'insurance' ? (
                            <Insurance employees={employees} insuranceRecords={insuranceRecords} setInsuranceRecords={setInsuranceRecords} showToast={showToast} />
                        ) : activeTab === 'contracts' ? (
                            <Contracts employees={employees} contractRecords={contractRecords} setContractRecords={setContractRecords} showToast={showToast} />
                        ) : activeTab === 'leaves' ? (
                            <Leaves employees={employees} onUpdateEmployee={updateEmployee} showToast={showToast} />
                        ) : activeTab === 'kpis' ? (
                            <KPIs employees={employees} showToast={showToast} />
                        ) : activeTab === 'evaluations' ? (
                            <Evaluations employees={employees} showToast={showToast} />
                        ) : activeTab === 'digital_files' ? (
                            <DigitalFiles employees={employees} showToast={showToast} askConfirm={askConfirm} />
                        ) : activeTab === 'training' ? (
                            <Training employees={employees} showToast={showToast} />
                        ) : activeTab === 'resignations' ? (
                            <Resignations employees={employees} resignations={resignations} setResignations={setResignations} onUpdateEmployee={updateEmployee} showToast={showToast} />
                        ) : activeTab === 'settings' ? (
                            <Settings appData={{ employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents, resignations, shifts }} onRestore={(d) => { handleRestore(d); showToast('تم استعادة البيانات بنجاح'); }} onClear={() => { handleClear(); showToast('تم مسح البيانات', 'warning'); }} shifts={shifts} setShifts={setShifts} showToast={showToast} askConfirm={askConfirm} />
                        ) : (
                            <div className="text-center py-40 text-slate-300 font-black text-4xl uppercase tracking-[0.2em] animate-pulse">سيتم التفعيل قريباً</div>
                        )}
                    </main>

                    {/* Toast Notifications */}
                    <div className="fixed bottom-10 left-10 z-[100] space-y-4 pointer-events-none">
                        {notifications.map(n => (
                            <div key={n.id} className={`pointer-events-auto flex items-center gap-4 px-8 py-5 rounded-[24px] shadow-2xl border animate-slide-up ${
                                n.type === 'error' ? 'bg-rose-600 border-rose-500 text-white' : 
                                n.type === 'warning' ? 'bg-amber-500 border-amber-400 text-white' : 
                                'bg-slate-900 border-slate-800 text-white'
                            }`}>
                                <Icon name={n.type === 'error' ? 'alert-circle' : n.type === 'warning' ? 'alert-triangle' : 'check-circle'} size={24} />
                                <span className="font-black text-lg">{n.message}</span>
                            </div>
                        ))}
                    </div>
                    <footer className="mt-12 mb-6 no-print flex flex-col md:flex-row items-center justify-between gap-6 px-10 py-6 bg-white rounded-[35px] border border-slate-100 shadow-sm">
                        <div className="flex items-center gap-8">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">تطوير: عمر نشأت &copy; {new Date().getFullYear()}</span>
                            </div>
                            <div className="hidden lg:flex items-center gap-6 border-r border-slate-100 pr-8">
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">إجمالي الموظفين</span>
                                    <span className="text-sm font-black text-slate-800">{employees.length}</span>
                                </div>
                                <div className="flex flex-col">
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">حالة النظام</span>
                                    <span className="text-sm font-black text-emerald-600">مستقر</span>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="px-4 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center gap-2">
                                <Icon name="database" size={14} className="text-slate-400" />
                                <span className="text-[10px] font-black text-slate-600 uppercase tracking-tighter">v2.5.0-stable</span>
                            </div>
                            <div className="px-4 py-2 bg-indigo-50 rounded-xl border border-indigo-100 flex items-center gap-2">
                                <Icon name="cpu" size={14} className="text-indigo-600" />
                                <span className="text-[10px] font-black text-indigo-600 uppercase tracking-tighter">AI Optimized</span>
                            </div>
                        </div>
                    </footer>
                    <ConfirmationModal 
                        isOpen={confirmState.isOpen}
                        title={confirmState.title}
                        message={confirmState.message}
                        onConfirm={confirmState.onConfirm}
                        onCancel={() => setConfirmState(prev => ({ ...prev, isOpen: false }))}
                        type={confirmState.type}
                    />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
</body>
</html>
