<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عالم الـ HR | إدارة الموارد البشرية المتكاملة</title>
    <meta name="description" content="نظام إدارة الموارد البشرية المتقدم - شؤون الموظفين، الحضور والانصراف، الرواتب، والأرشفة الرقمية.">
    <link rel="manifest" href="/manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const pdfjs = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
            if (pdfjs) {
                window.pdfjsLib = pdfjs;
                pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
        });
    </script>
    <!-- Mammoth for DOCX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <style>
        @keyframes slide-up {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scale-in {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes loading-bar {
            0% { width: 0%; transform: translateX(-100%); }
            50% { width: 70%; transform: translateX(0); }
            100% { width: 100%; transform: translateX(100%); }
        }
        .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .animate-scale-in { animation: scale-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .animate-loading-bar { animation: loading-bar 2s infinite ease-in-out; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        #root {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .glass-card {
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        
        /* Full Page Fixes */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        @media print {
            @page { 
                size: A4; 
                margin: 10mm; 
            }
            @page landscape {
                size: A4 landscape;
                margin: 10mm;
            }
            @page portrait {
                size: A4 portrait;
                margin: 10mm;
            }
            html, body { 
                width: 100%; 
                height: auto; 
                background: white !important; 
                color: black !important; 
                margin: 0;
                padding: 0;
                font-size: 10pt;
                overflow: visible !important;
            }
            #root {
                min-height: auto !important;
                display: block !important;
            }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            
            main { padding: 0 !important; margin: 0 !important; display: block !important; }
            .desktop-container { max-width: none !important; padding: 0 !important; margin: 0 !important; display: block !important; }
            
            .shadow-2xl, .shadow-xl, .shadow-sm, .shadow-lg, .shadow-md { box-shadow: none !important; }
            .glass-card { border: 1px solid #e2e8f0 !important; border-radius: 0 !important; transform: none !important; }
            
            /* Professional Print Typography */
            h1, h2, h3, h4 { color: #000 !important; font-weight: 900 !important; }
            p, span, td, th { color: #000 !important; font-weight: 600 !important; }
            
            table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            th, td { border: 1px solid #000 !important; padding: 4px !important; }

            /* Unified Document Box Style (Payslip & Warning) */
            .payslip-box, .warning-box {
                border: 2px solid #000 !important;
                padding: 40px !important;
                margin: 0 auto !important;
                width: 190mm !important;
                min-height: 270mm !important;
                height: auto !important;
                box-sizing: border-box !important;
                background: white !important;
                display: flex !important;
                flex-direction: column !important;
                page-break-inside: avoid !important;
                page-break-after: always !important;
            }
            
            /* Force Portrait for these */
            .payslip-box, .warning-box, .report-container {
                page: portrait;
            }

            .payslip-box *, .warning-box * {
                color: #000 !important;
            }
            .payslip-box .detail-row, .warning-box .detail-row {
                border-bottom: 1px solid #e2e8f0 !important;
                padding: 8px 0 !important;
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
            }
            .payslip-box .detail-row:last-child, .warning-box .detail-row:last-child {
                border-bottom: none !important;
            }

            .net-salary-box-print {
                border: 3px solid #000 !important;
                background-color: #f8fafc !important;
                -webkit-print-color-adjust: exact;
                padding: 15px !important;
                margin-top: 15px !important;
            }
            .net-salary-box-print * {
                color: #000 !important;
            }

            /* Payroll Table Specific (Landscape) */
            .landscape-page {
                width: 280mm !important;
                height: 195mm !important;
                border: 2px solid #000 !important;
                padding: 10px !important;
                margin: 0 auto !important;
                box-sizing: border-box !important;
                page-break-after: always !important;
                display: flex !important;
                flex-direction: column !important;
                page: landscape;
            }

            .payroll-table {
                width: 100% !important;
                font-size: 7.5pt !important;
                border-collapse: collapse !important;
                table-layout: fixed !important;
            }
            .payroll-table th, .payroll-table td {
                padding: 2px !important;
                border: 1px solid #000 !important;
            }
            .payroll-table thead tr {
                background-color: #f1f5f9 !important;
                -webkit-print-color-adjust: exact;
            }

            /* Single Page PDF Mode - Guaranteed One Page Fit */
            body.single-page-mode {
                overflow: visible !important;
            }
            
            body.single-page-mode .payslip-box, 
            body.single-page-mode .warning-box {
                width: 210mm !important;
                height: 297mm !important;
                max-height: 297mm !important;
                padding: 10mm !important;
                margin: 0 !important;
                border: none !important;
                box-sizing: border-box !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
                overflow: hidden !important;
                background: white !important;
                display: flex !important;
                flex-direction: column !important;
            }

            body.single-page-mode .landscape-page {
                width: 297mm !important;
                height: 210mm !important;
                max-height: 210mm !important;
                padding: 5mm !important;
                margin: 0 !important;
                border: none !important;
                box-sizing: border-box !important;
                page-break-after: avoid !important;
                page-break-inside: avoid !important;
                overflow: hidden !important;
                background: white !important;
            }

            body.single-page-mode .report-container {
                width: 190mm !important;
                padding: 4mm !important;
                min-height: auto !important;
                height: 285mm !important;
                overflow: hidden !important;
                margin: 0 auto !important;
                border: 1px solid #000 !important;
                display: flex !important;
                flex-direction: column !important;
                page-break-after: always !important;
            }

            body.single-page-mode .report-container table {
                font-size: 8.5pt !important;
            }

            body.single-page-mode .report-container td, 
            body.single-page-mode .report-container th {
                padding: 1px 1px !important;
                line-height: 1 !important;
            }

            body.single-page-mode .print-signatures {
                margin-top: auto !important;
                margin-bottom: 10px !important;
                gap: 10px !important;
            }

            body.single-page-mode .print-signatures > div {
                font-size: 8pt !important;
                padding-top: 3px !important;
            }

            body.single-page-mode .report-table-wrapper {
                margin-bottom: 2px !important;
            }

            body.single-page-mode h1 {
                font-size: 1rem !important;
                margin-bottom: 2px !important;
            }

            body.single-page-mode .hidden.print\:block.text-lg {
                font-size: 10pt !important;
                padding-top: 2px !important;
                margin-top: 2px !important;
            }

            body.single-page-mode {
                zoom: 0.9;
            }
            
            /* Attendance Report Specific */
            .report-container, .pdf-container {
                border: 2px solid #000 !important;
                padding: 10mm !important;
                margin: 0 auto !important;
                width: 190mm !important;
                min-height: 277mm !important;
                box-sizing: border-box !important;
                page-break-after: always !important;
                display: flex !important;
                flex-direction: column !important;
                background: white !important;
                -webkit-print-color-adjust: exact;
                position: relative !important;
            }
            .report-container table, .pdf-container table {
                font-size: 8.5pt !important;
                width: 100% !important;
                border-collapse: collapse !important;
                table-layout: fixed !important;
            }
            .report-container th, .report-container td, .pdf-container th, .pdf-container td {
                padding: 4px 2px !important;
                border: 1px solid #000 !important;
                word-wrap: break-word !important;
                overflow-wrap: break-word !important;
            }

            .payroll-print-wrapper, .report-table-wrapper {
                flex: 1 !important;
            }
            .print-signatures {
                display: flex !important;
                justify-content: space-between !important;
                gap: 60px !important;
                margin-bottom: 60px !important;
                padding-bottom: 20px !important;
                text-align: center !important;
                width: 100% !important;
            }
            .print-signatures > div {
                flex: 1 !important;
                border-top: 2px solid #000 !important;
                padding-top: 12px !important;
                font-weight: 900 !important;
                font-size: 11pt !important;
                color: #000 !important;
            }
        }
        .print-only { display: none; }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; border: 2px solid #f1f5f9; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        /* Screen Visibility Improvements */
        .report-container:not(.print-only) {
            background: white !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04) !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 24px !important;
            padding: 2rem !important;
            width: 100% !important;
            max-width: 1200px !important;
            margin: 0 auto !important;
        }

        .report-container table:not(.print-only) {
            font-size: 13px !important;
        }

        .report-container th:not(.print-only), .report-container td:not(.print-only) {
            padding: 12px 8px !important;
            border: 1px solid #f1f5f9 !important;
        }

        .report-container thead tr:not(.print-only) {
            background-color: #f8fafc !important;
            color: #475569 !important;
        }

        .payslip-box:not(.print-only) {
            background: white !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 32px !important;
            padding: 3rem !important;
            width: 100% !important;
            max-width: 800px !important;
            margin: 0 auto !important;
        }
        .print-only { display: none; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .writing-mode-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .scroll-hidden::-webkit-scrollbar {
            display: none;
        }
        
        /* Table Styles for Payroll */
        .payroll-table th, .payroll-table td {
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
