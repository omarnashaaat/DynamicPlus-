                                <button 
                                    onClick={addEarlyTier}
                                    className="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-600 hover:text-white transition-all"
                                    title="إضافة شريحة"
                                >
                                    <Icon name="plus" size={20} />
                                </button>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-black text-slate-400 uppercase mb-2">جزاء الغياب (بالساعات)</label>
                                    <input 
                                        type="number" 
                                        value={rules.absencePenalty}
                                        onChange={(e) => setRules({...rules, absencePenalty: parseFloat(e.target.value) || 0})}
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl p-4 font-bold focus:ring-2 focus:ring-indigo-500/20 outline-none"
                                    />
                                </div>

                                <div className="space-y-3">
                                    <p className="text-sm font-black text-slate-700">شرائح الانصراف المبكر:</p>
                                    {(rules.earlyTiers || []).map((tier, i) => (
                                        <div key={i} className="flex flex-wrap items-center gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 relative group">
                                            <span className="text-xs font-bold text-slate-500">من</span>
                                            <input 
                                                type="number" 
                                                value={tier.min} 
                                                onChange={(e) => updateEarlyTier(i, 'min', e.target.value)}
                                                className="w-16 bg-white border rounded-lg p-1 text-center font-bold" 
                                            />
                                            <span className="text-xs font-bold text-slate-500">إلى</span>
                                            <input 
                                                type="number" 
                                                value={tier.max} 
                                                onChange={(e) => updateEarlyTier(i, 'max', e.target.value)}
                                                className="w-16 bg-white border rounded-lg p-1 text-center font-bold" 
                                            />
                                            <span className="text-xs font-bold text-slate-500">دقيقة =</span>
                                            <input 
                                                type="number" 
                                                step="0.25" 
                                                value={tier.penalty} 
                                                onChange={(e) => updateEarlyTier(i, 'penalty', e.target.value)}
                                                className="w-16 bg-white border rounded-lg p-1 text-center font-bold text-rose-600" 
                                            />
                                            <span className="text-xs font-bold text-slate-500">ساعة خصم</span>
                                            <button 
                                                onClick={() => removeEarlyTier(i)}
                                                className="absolute -left-2 top-1/2 -translate-y-1/2 p-1.5 bg-rose-50 text-rose-500 rounded-lg sm:opacity-0 group-hover:opacity-100 transition-all hover:bg-rose-500 hover:text-white"
                                            >
                                                <Icon name="trash-2" size={14} />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => {
                return localStorage.getItem('hr_isLoggedIn') === 'true';
            });
            const [username, setUsername] = useState(() => {
                return localStorage.getItem('hr_username') || '';
            });
            const [activeTab, setActiveTab] = useState('dashboard');
            const [employees, setEmployees] = useState(() => {
                const saved = localStorage.getItem('hr_employees');
                return saved ? JSON.parse(saved) : INITIAL_EMPLOYEES;
            });
            const [insuranceRecords, setInsuranceRecords] = useState(() => {
                const saved = localStorage.getItem('hr_insurance');
                return saved ? JSON.parse(saved) : {};
            });
            const [contractRecords, setContractRecords] = useState(() => {
                const saved = localStorage.getItem('hr_contracts');
                return saved ? JSON.parse(saved) : {};
            });
            const [attendanceLog, setAttendanceLog] = useState(() => {
                const saved = localStorage.getItem('hr_attendance');
                return saved ? JSON.parse(saved) : {};
            });
            const [payrollRecords, setPayrollRecords] = useState(() => {
                const saved = localStorage.getItem('hr_payroll');
                return saved ? JSON.parse(saved) : {};
            });
            const [calendarEvents, setCalendarEvents] = useState(() => {
                const saved = localStorage.getItem('hr_calendar');
                return saved ? JSON.parse(saved) : INITIAL_CALENDAR_EVENTS;
            });
            const [resignations, setResignations] = useState(() => {
                const saved = localStorage.getItem('hr_resignations');
                return saved ? JSON.parse(saved) : [];
            });
            const [shifts, setShifts] = useState(() => {
                const saved = localStorage.getItem('hr_shifts');
                const parsed = saved ? JSON.parse(saved) : INITIAL_SHIFTS;
                // Force update to 4 shifts if the user has old 3-shift data
                if (Object.keys(parsed).length < 4) {
                    return INITIAL_SHIFTS;
                }
                return parsed;
            });
            const [attendanceRules, setAttendanceRules] = useState(() => {
                const saved = localStorage.getItem('hr_attendance_rules');
                return saved ? JSON.parse(saved) : {
                    lateGracePeriod: 15,
                    earlyDepartureGrace: 0,
                    absencePenalty: 8,
                    lateTiers: [
                        { min: 16, max: 30, penalty: 0.5 },
                        { min: 31, max: 60, penalty: 1 },
                        { min: 61, max: 90, penalty: 1.5 },
                        { min: 91, max: 120, penalty: 2 },
                        { min: 121, max: 150, penalty: 3 },
                        { min: 151, max: 180, penalty: 4 }
                    ],
                    earlyTiers: [
                        { min: 1, max: 15, penalty: 0.5 },
                        { min: 16, max: 30, penalty: 1 },
                        { min: 31, max: 60, penalty: 1 },
                        { min: 61, max: 90, penalty: 1.5 },
                        { min: 91, max: 120, penalty: 2 },
                        { min: 121, max: 150, penalty: 3 },
                        { min: 151, max: 180, penalty: 4 }
                    ]
                };
            });
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isSaving, setIsSaving] = useState(false);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [syncStatus, setSyncStatus] = useState('idle');

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            // Initial fetch from backend
            useEffect(() => {
                if (isOnline) {
                    const fetchData = async () => {
                        try {
                            const [empRes, attRes, setRes] = await Promise.all([
                                fetch('/api/employees'),
                                fetch('/api/attendance'),
                                fetch('/api/settings')
                            ]);
                            
                            if (empRes.ok) {
                                const emps = await empRes.json();
                                if (emps.length > 0) setEmployees(emps);
                            }
                            if (attRes.ok) {
                                const att = await attRes.json();
                                if (Object.keys(att).length > 0) setAttendanceLog(att);
                            }
                            if (setRes.ok) {
                                const settings = await setRes.json();
                                if (settings.shifts) setShifts(settings.shifts);
                                if (settings.attendance_rules) setAttendanceRules(settings.attendance_rules);
                                if (settings.insurance) setInsuranceRecords(settings.insurance);
                                if (settings.contracts) setContractRecords(settings.contracts);
                                if (settings.payroll) setPayrollRecords(settings.payroll);
                                if (settings.calendar) setCalendarEvents(settings.calendar);
                                if (settings.resignations) setResignations(settings.resignations);
                            }
                        } catch (err) {
                            console.error('Failed to fetch initial data:', err);
                        }
                    };
                    fetchData();
                }
            }, [isOnline]);

            // Sync to backend
            useEffect(() => {
                if (!isOnline) return;

                const sync = async () => {
                    setSyncStatus('syncing');
                    try {
                        await Promise.all([
                            fetch('/api/employees', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ employees })
                            }),
                            fetch('/api/attendance', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ attendance: attendanceLog })
                            }),
                            fetch('/api/settings', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    settings: {
                                        shifts,
                                        attendance_rules: attendanceRules,
                                        insurance: insuranceRecords,
                                        contracts: contractRecords,
                                        payroll: payrollRecords,
                                        calendar: calendarEvents,
                                        resignations
                                    }
                                })
                            })
                        ]);
                        setSyncStatus('idle');
                    } catch (err) {
                        console.error('Sync failed:', err);
                        setSyncStatus('error');
                    }
                };

                const timer = setTimeout(sync, 5000);
                return () => clearTimeout(timer);
            }, [isOnline, employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents, shifts, attendanceRules, resignations]);

            // Keyboard Navigation Logic
            useEffect(() => {
                const handleKeyDown = (e) => {
                    const active = document.activeElement;
                    if (!active || !['INPUT', 'SELECT', 'TEXTAREA'].includes(active.tagName)) return;

                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const form = active.closest('form') || document;
                        const focusable = Array.from(form.querySelectorAll('input, select, textarea, button')).filter(el => !el.disabled && el.tabIndex !== -1);
                        const index = focusable.indexOf(active);
                        if (index > -1 && index < focusable.length - 1) {
                            focusable[index + 1].focus();
                        }
                    }

                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        const cell = active.closest('td');
                        if (!cell) return;
                        const row = cell.parentElement;
                        const table = row.closest('table');
                        const colIndex = Array.from(row.children).indexOf(cell);
                        const rowIndex = Array.from(table.querySelectorAll('tbody tr')).indexOf(row);

                        if (e.key === 'ArrowDown') {
                            const nextRow = table.querySelectorAll('tbody tr')[rowIndex + 1];
                            if (nextRow) nextRow.children[colIndex].querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowUp') {
                            const prevRow = table.querySelectorAll('tbody tr')[rowIndex - 1];
                            if (prevRow) prevRow.children[colIndex].querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowRight') {
                            const nextCell = row.children[colIndex - 1];
                            if (nextCell) nextCell.querySelector('input, select')?.focus();
                        } else if (e.key === 'ArrowLeft') {
                            const prevCell = row.children[colIndex + 1];
                            if (prevCell) prevCell.querySelector('input, select')?.focus();
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                const save = () => {
                    localStorage.setItem('hr_isLoggedIn', isLoggedIn);
                    localStorage.setItem('hr_username', username);
                    localStorage.setItem('hr_employees', JSON.stringify(employees));
                    localStorage.setItem('hr_insurance', JSON.stringify(insuranceRecords));
                    localStorage.setItem('hr_contracts', JSON.stringify(contractRecords));
                    localStorage.setItem('hr_attendance', JSON.stringify(attendanceLog));
                    localStorage.setItem('hr_payroll', JSON.stringify(payrollRecords));
                    localStorage.setItem('hr_calendar', JSON.stringify(calendarEvents));
                    localStorage.setItem('hr_resignations', JSON.stringify(resignations));
                    localStorage.setItem('hr_shifts', JSON.stringify(shifts));
                    localStorage.setItem('hr_attendance_rules', JSON.stringify(attendanceRules));
                    
                    setIsSaving(true);
                    const timer = setTimeout(() => setIsSaving(false), 1500);
                    return () => clearTimeout(timer);
                };
                save();
            }, [isLoggedIn, employees, insuranceRecords, contractRecords, attendanceLog, payrollRecords, calendarEvents, shifts, attendanceRules]);

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const downloadPDF = async () => {
                const element = document.querySelector('main');
                const isLandscape = activeTab === 'payroll' || activeTab === 'monthly_report';
                
                // Show loading indicator
                const loading = document.createElement('div');
                loading.id = 'pdf-loading-overlay';
                loading.className = 'fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-[10000] no-print';
                loading.innerHTML = `
                    <div class="bg-white p-10 rounded-[40px] shadow-2xl flex flex-col items-center gap-6 text-center border-t-8 border-indigo-600 max-w-sm mx-4">
                        <div class="w-20 h-20 border-8 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 mb-2">جاري التحميل...</h2>
                            <p class="text-slate-500 font-bold leading-relaxed">نجهز لك التقرير في صفحة واحدة بجودة عالية، لحظات من فضلك.</p>
                        </div>
                    </div>
                `;
                document.body.appendChild(loading);

                try {
                    // Hide buttons using visibility instead of display to preserve layout
                    const buttons = document.querySelectorAll('.no-print');
                    buttons.forEach(btn => btn.style.opacity = '0');
                    buttons.forEach(btn => btn.style.pointerEvents = 'none');

                    const opt = {
                        margin: 5,
                        filename: `تقرير_${activeTab}_${new Date().toLocaleDateString('ar-EG')}.pdf`,
                        image: { type: 'jpeg', quality: 1 },
                        html2canvas: { 
                            scale: 2, 
                            useCORS: true,
                            letterRendering: true,
                            scrollY: 0,
                            windowWidth: document.documentElement.offsetWidth
                        },
                        jsPDF: { 
                            unit: 'mm', 
                            format: 'a4', 
                            orientation: isLandscape ? 'landscape' : 'portrait',
                            compress: true
                        },
                        pagebreak: { mode: 'avoid-all' }
                    };

                    await html2pdf().set(opt).from(element).save();

                } catch (error) {
                    console.error('PDF Error:', error);
                } finally {
                    // Restore buttons visibility
                    const buttons = document.querySelectorAll('.no-print');
                    buttons.forEach(btn => btn.style.opacity = '1');
                    buttons.forEach(btn => btn.style.pointerEvents = 'auto');
                    
                    const overlay = document.getElementById('pdf-loading-overlay');
                    if (overlay) document.body.removeChild(overlay);
                }
            };

            const addEmployee = (d) => setEmployees([...employees, { ...d, id: Date.now().toString(), status: 'نشط', totalLeaves: 21, monthlyLeaves: Array(12).fill(0) }]);
            const bulkAddEmployees = (list) => setEmployees(p => [...p, ...list]);
            const updateEmployee = (u) => setEmployees(employees.map(e => e.id === u.id ? { ...e, ...u } : e));
            const deleteEmployee = (id) => setEmployees(employees.filter(e => e.id !== id));

            const handleRestore = (data) => {
                if (data.employees) setEmployees(data.employees);
                if (data.attendanceLog) setAttendanceLog(data.attendanceLog);
                if (data.insuranceRecords) setInsuranceRecords(data.insuranceRecords);
                if (data.contractRecords) setContractRecords(data.contractRecords);
                if (data.payrollRecords) setPayrollRecords(data.payrollRecords);
                if (data.calendarEvents) setCalendarEvents(data.calendarEvents);
                if (data.resignations) setResignations(data.resignations);
                if (data.shifts) setShifts(data.shifts);
            };

            const handleClear = () => {
                if (confirm('تحذير: هل أنت متأكد من مسح كافة بيانات النظام نهائياً؟ لا يمكن التراجع عن هذه الخطوة.')) {
                    setEmployees([]);
                    setAttendanceLog({});
                    setInsuranceRecords({});
                    setContractRecords({});
                    setPayrollRecords({});
                    setCalendarEvents([]);
                    setResignations([]);
                    setShifts(INITIAL_SHIFTS);
                    alert('تم مسح كافة البيانات بنجاح.');
                }
            };

            const formattedDate = currentTime.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const formattedTime = currentTime.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100">
                        <div className="max-w-md w-full p-12 rounded-[60px] text-center border shadow-2xl bg-white border-slate-200">
                            <div className="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center text-white mx-auto mb-8 shadow-2xl rotate-3"><Icon name="user-circle-2" size={54} /></div>
                            <h1 className="text-4xl font-black text-slate-800 mb-2 tracking-tight">Dynamic Plus</h1>
                            <p className="text-slate-500 mb-10 font-bold uppercase tracking-widest text-xs">نظام إدارة الموارد البشرية المتكامل</p>
                            <form onSubmit={(e) => { 
                                e.preventDefault(); 
                                if(username.trim() !== '') {
                                    setIsLoggedIn(true);
                                } else {
                                    alert('الرجاء إدخال الاسم');
                                }
                            }} className="space-y-6">
                                <input required type="text" placeholder="الاسم" className="w-full bg-slate-50 border border-slate-200 rounded-2xl py-5 px-8 text-slate-800 text-center text-xl font-bold focus:outline-none" value={username} onChange={(e) => setUsername(e.target.value)} />
                                <button type="submit" className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 text-xl">دخول النظام <Icon name="arrow-left" size={24} /></button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col desktop-container px-6 py-8">
                    {activeTab !== 'dashboard' && (
                        <div className="mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 no-print">
                            <div className="flex gap-2 w-full sm:w-auto">
                                <button onClick={downloadPDF} className="flex-1 sm:flex-none justify-center flex items-center gap-2 px-6 py-3 bg-indigo-600 text-white hover:bg-indigo-700 rounded-2xl font-black transition-all shadow-lg">
                                    <Icon name="download" size={20} />
                                    تنزيل PDF مباشر
                                </button>
                                <button onClick={() => setActiveTab('dashboard')} className="flex-1 sm:flex-none justify-center flex items-center gap-2 px-6 py-3 bg-white hover:bg-slate-50 text-slate-700 rounded-2xl font-black transition-all shadow-sm border border-slate-200">
                                    <Icon name="arrow-right" size={20} />
                                    عودة
                                </button>
                            </div>
                            <div className="w-full sm:w-auto flex items-center justify-between sm:justify-start gap-4 bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm">
                                {/* Connection Status Indicator */}
                                <div className={`flex items-center gap-2 px-3 py-1 rounded-xl transition-all ${isOnline ? 'bg-emerald-50 text-emerald-700' : 'bg-rose-50 text-rose-700'}`}>
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? (syncStatus === 'syncing' ? 'bg-emerald-500 animate-pulse' : 'bg-emerald-500') : 'bg-rose-500'}`}></div>
                                    <span className="text-[10px] font-black">{isOnline ? (syncStatus === 'syncing' ? 'مزامنة...' : 'متصل') : 'أوفلاين'}</span>
                                </div>
                                <div className="flex flex-col text-right leading-tight">
                                    <span className="text-[13px] font-bold text-slate-700">{formattedDate}</span>
                                    <span className="text-[11px] font-black text-indigo-600 font-mono">{formattedTime}</span>
                                </div>
                                <div className="w-9 h-9 rounded-xl bg-indigo-50 text-indigo-600 flex items-center justify-center">
                                    <Icon name="calendar" size={18} />
                                </div>
                            </div>
                        </div>
                    )}
                    <main className="flex-1">
                        {activeTab === 'dashboard' ? (
                            <Dashboard setActiveTab={setActiveTab} userName={username || "المدير"} employees={employees} attendanceLog={attendanceLog} setIsLoggedIn={setIsLoggedIn} downloadPDF={downloadPDF} isOnline={isOnline} syncStatus={syncStatus} />
                        ) : activeTab === 'employees' ? (
                            <EmployeeTable employees={employees} onAddEmployee={addEmployee} onUpdateEmployee={updateEmployee} onDeleteEmployee={deleteEmployee} onBulkAdd={bulkAddEmployees} setActiveTab={setActiveTab} shifts={shifts} />
                        ) : activeTab === 'attendance' ? (
                            <Attendance employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} shifts={shifts} rules={attendanceRules} />
                        ) : activeTab === 'monthly_report' ? (
                            <MonthlyReport employees={employees} attendanceLog={attendanceLog} setAttendanceLog={setAttendanceLog} shifts={shifts} rules={attendanceRules} />
                        ) : activeTab === 'attendance_rules' ? (
                            <AttendanceRules rules={attendanceRules} setRules={setAttendanceRules} />
                        ) : activeTab === 'payroll' ? (
                            <Payroll employees={employees} payrollRecords={payrollRecords} setPayrollRecords={setPayrollRecords} attendanceLog={attendanceLog} setActiveTab={setActiveTab} rules={attendanceRules} />
                        ) : activeTab === 'recruitment' ? (
                            <Recruitment employees={employees} />
                        ) : activeTab === 'ats' ? (
                            <ATS employees={employees} />
                        ) : activeTab === 'calendar' ? (
                            <Calendar employees={employees} calendarEvents={calendarEvents} setCalendarEvents={setCalendarEvents} />
                        ) : activeTab === 'archive' ? (
                            <Archive employees={employees} />
                        ) : activeTab === 'insurance' ? (
                            <Insurance employees={employees} insuranceRecords={insuranceRecords} setInsuranceRecords={setInsuranceRecords} />
                        ) : activeTab === 'contracts' ? (
                            <Contracts employees={employees} contractRecords={contractRecords} setContractRecords={setContractRecords} />
                        ) : activeTab === 'leaves' ? (
                            <Leaves employees={employees} onUpdateEmployee={updateEmployee} />
                        ) : activeTab === 'kpis' ? (
                            <KPIs employees={employees} />
                        ) : activeTab === 'evaluations' ? (
                            <Evaluations employees={employees} />
                        ) : activeTab === 'digital_files' ? (
                            <DigitalFiles employees={employees} />
                        ) : activeTab === 'training' ? (
                            <Training employees={employees} />
                        ) : activeTab === 'resignations' ? (
                            <Resignations employees={employees} resignations={resignations} setResignations={setResignations} onUpdateEmployee={updateEmployee} />
                        ) : activeTab === 'settings' ? (
                            <Settings appData={{ employees, attendanceLog, insuranceRecords, contractRecords, payrollRecords, calendarEvents, resignations, shifts }} onRestore={handleRestore} onClear={handleClear} shifts={shifts} setShifts={setShifts} />
                        ) : (
                            <div className="text-center py-40 text-slate-300 font-black text-4xl uppercase tracking-[0.2em] animate-pulse">سيتم التفعيل قريباً</div>
                        )}
                    </main>
                    <footer className="mt-12 mb-6 text-center no-print text-slate-500 font-bold text-[12px] uppercase tracking-wide">تطوير: عمر نشأت &copy; {new Date().getFullYear()}</footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
</body>
</html>
