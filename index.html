<body>
    <div id="root"></div>

    <!-- React and Lucide Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                    const svg = containerRef.current.querySelector('svg');
                    if (svg) {
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) className.split(' ').filter(Boolean).forEach(cls => svg.classList.add(cls));
                    }
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center pointer-events-none" style={{ width: size, height: size }}></span>;
        };

        const INITIAL_SHIFTS = {
            '1': { id: '1', name: 'الوردية الأولى (9ص - 5م)', start: '09:00', end: '17:00' },
            '2': { id: '2', name: 'الوردية الثانية (8:30ص - 5:30م)', start: '08:30', end: '17:30' },
            '3': { id: '3', name: 'الوردية الثالثة (9:30ص - 5:30م)', start: '09:30', end: '17:30' },
            '4': { id: '4', name: 'وردية رمضان (9ص - 3م)', start: '09:00', end: '15:00' }
        };

        const getShiftByAny = (idOrName, shifts) => {
            if (shifts[idOrName]) return shifts[idOrName];
            return Object.values(shifts).find(s => s.name === idOrName) || Object.values(shifts)[0];
        };

        const calculateDeduction = (arrival, departure, empShiftId = '1', shifts = INITIAL_SHIFTS, rules = null, date = null) => {
            // Friday (5) and Saturday (6) are holidays with no deductions
            if (date) {
                const d = new Date(date);
                if (d.getDay() === 5 || d.getDay() === 6) {
                    return { late: 0, early: 0, total: 0 };
                }
            }

            const shift = getShiftByAny(empShiftId, shifts);
            const [sH, sM] = shift.start.split(':').map(Number);
            const [eH, eM] = shift.end.split(':').map(Number);
            const shiftStartMinutes = sH * 60 + sM;
            const shiftEndMinutes = eH * 60 + eM;

            // Default rules if not provided
            const activeRules = rules || {
                lateGracePeriod: 15,
                earlyDepartureGrace: 0,
                absencePenalty: 8,
                lateTiers: [
                    { min: 16, max: 30, penalty: 0.5 },
                    { min: 31, max: 60, penalty: 1 },
                    { min: 61, max: 90, penalty: 1.5 },
                    { min: 91, max: 120, penalty: 2 },
                    { min: 121, max: 150, penalty: 3 },
                    { min: 151, max: 180, penalty: 4 }
                ],
                earlyTiers: [
                    { min: 1, max: 15, penalty: 0.5 },
                    { min: 16, max: 30, penalty: 1 },
                    { min: 31, max: 60, penalty: 1 },
                    { min: 61, max: 90, penalty: 1.5 },
                    { min: 91, max: 120, penalty: 2 },
                    { min: 121, max: 150, penalty: 3 },
                    { min: 151, max: 180, penalty: 4 }
                ]
            };

            let lateDeduction = 0;
            if (arrival) {
                const [h, m] = arrival.split(':').map(Number);
                const totalMinutes = h * 60 + m;
                const diff = totalMinutes - shiftStartMinutes;

                if (diff <= activeRules.lateGracePeriod) {
                    lateDeduction = 0;
                } else {
                    const tier = activeRules.lateTiers.find(t => diff >= t.min && diff <= t.max);
                    if (tier) {
                        lateDeduction = tier.penalty;
                    } else if (diff > 180) {
                        lateDeduction = activeRules.absencePenalty;
                    }
                }
            } else {
                lateDeduction = activeRules.absencePenalty;
            }

            let earlyDeduction = 0;
            if (departure) {
                const [h, m] = departure.split(':').map(Number);
                const totalMinutes = h * 60 + m;
                const diff = shiftEndMinutes - totalMinutes;

                if (diff > activeRules.earlyDepartureGrace) {
                    const tier = activeRules.earlyTiers?.find(t => diff >= t.min && diff <= t.max);
                    if (tier) {
                        earlyDeduction = tier.penalty;
                    } else if (diff > 180) {
                        earlyDeduction = activeRules.absencePenalty / 2;
                    }
                }
            }
            
            return {
                late: lateDeduction,
                early: earlyDeduction,
                total: lateDeduction + earlyDeduction
            };
        };

        const calculateDetailedAttendance = (arrival, departure, empShiftId = '1', shifts = INITIAL_SHIFTS, rules = null, date = null) => {
            if (date) {
                const d = new Date(date);
                if (d.getDay() === 5 || d.getDay() === 6) {
                    // Weekend: No late/early deductions
                    const shift = getShiftByAny(empShiftId, shifts);
                    const [sH, sM] = shift.start.split(':').map(Number);
                    const [eH, eM] = shift.end.split(':').map(Number);
                    const shiftEndMin = eH * 60 + eM;

                    if (!arrival || !departure) return { total: '0:00', late: '0.00', early: '0.00', ot: '0:00' };
                    
                    const [aH, aM] = arrival.split(':').map(Number);
                    const [dH, dM] = departure.split(':').map(Number);
                    const arrivalMin = aH * 60 + aM;
                    const departureMin = dH * 60 + dM;

                    const totalMin = Math.max(0, departureMin - arrivalMin);
                    const totalHours = Math.floor(totalMin / 60);
                    const totalMins = totalMin % 60;
                    const totalStr = `${totalHours}:${totalMins.toString().padStart(2, '0')}`;

                    let otMin = 0;
                    if (departureMin > shiftEndMin) otMin = departureMin - shiftEndMin;
                    const otHours = Math.floor(otMin / 60);
                    const otMins = otMin % 60;
                    const otStr = `${otHours}:${otMins.toString().padStart(2, '0')}`;

                    return { total: totalStr, late: '0.00', early: '0.00', ot: otStr };
                }
            }

            if (!arrival || !departure) return { total: '0:00', late: '0.00', early: '0.00', ot: '0:00' };
            
            const shift = getShiftByAny(empShiftId, shifts);
            const [sH, sM] = shift.start.split(':').map(Number);
            const [eH, eM] = shift.end.split(':').map(Number);
            const shiftStartMin = sH * 60 + sM;
            const shiftEndMin = eH * 60 + eM;

            const [aH, aM] = arrival.split(':').map(Number);
            const [dH, dM] = departure.split(':').map(Number);
            const arrivalMin = aH * 60 + aM;
            const departureMin = dH * 60 + dM;

            const totalMin = Math.max(0, departureMin - arrivalMin);
            const totalHours = Math.floor(totalMin / 60);
            const totalMins = totalMin % 60;
            const totalStr = `${totalHours}:${totalMins.toString().padStart(2, '0')}`;

            const activeRules = rules || {
                lateGracePeriod: 15,
                earlyDepartureGrace: 15,
                absencePenalty: 1,
                lateTiers: [
                    { min: 16, max: 30, penalty: 0.25 },
                    { min: 31, max: 60, penalty: 0.5 },
                    { min: 61, max: 120, penalty: 1 }
                ]
            };

            let late = 0;
            const lateDiff = arrivalMin - shiftStartMin;
            if (lateDiff > activeRules.lateGracePeriod) {
                late = lateDiff / 60;
            }

            let early = 0;
            const earlyDiff = shiftEndMin - departureMin;
            if (earlyDiff > activeRules.earlyDepartureGrace) {
                early = earlyDiff / 60;
            }

            let otMin = 0;
            if (departureMin > shiftEndMin) otMin = departureMin - shiftEndMin;
            const otHours = Math.floor(otMin / 60);
            const otMins = otMin % 60;
            const otStr = `${otHours}:${otMins.toString().padStart(2, '0')}`;

            return { total: totalStr, late: late.toFixed(2), early: early.toFixed(2), ot: otStr };
        };

        const Attendance = ({ employees, attendanceLog, setAttendanceLog, shifts, rules, showToast }) => {
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);
            const [previewData, setPreviewData] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const fileInputRef = useRef(null);

            const updateRecord = (empId, field, value) => {
                const dateRecords = attendanceLog[selectedDate] || {};
                const emp = employees.find(e => e.id === empId);
                const defaultShift = emp?.shift || Object.values(shifts)[0]?.name || '';
                
                const currentRecord = dateRecords[empId] || { 
                    arrivalTime: '', 
                    departureTime: '', 
                    deduction: 0, 
                    lateDeduction: 0, 
                    earlyDeduction: 0, 
                    shift: defaultShift, 
                    overtimeHours: 0,
                    overtimeValue: 0,
                    notes: '' 
                };

                let finalValue = value;
                if (field === 'shift') {
                    Object.values(shifts).forEach(s => {
                        if (value === s.name.split(' (')[0] || value === s.name) {
                            finalValue = s.name;
                        }
                    });
                }

                const updated = { ...currentRecord, [field]: finalValue };

                // Auto-recalculate deduction if times or shift change
                if (field === 'arrivalTime' || field === 'departureTime' || field === 'shift') {
                    const d = calculateDeduction(
                        updated.arrivalTime, 
                        updated.departureTime, 
                        updated.shift, 
                        shifts, 
                        rules,
                        selectedDate
                    );
                    updated.lateDeduction = d.late;
                    updated.earlyDeduction = d.early;
                    updated.deduction = d.total;
                    
                    // Clear excel-imported hours so they are recalculated dynamically
                    updated.lateHours = undefined;
                    updated.earlyHours = undefined;
                    updated.totalHours = undefined;
                    updated.overtimeHours = undefined;
                }

                if (field === 'lateDeduction' || field === 'earlyDeduction') {
                    updated.deduction = (parseFloat(updated.lateDeduction) || 0) + (parseFloat(updated.earlyDeduction) || 0);
                }

                setAttendanceLog(prev => ({
                    ...prev,
                    [selectedDate]: { ...dateRecords, [empId]: updated }
                }));
            };

            const handleFingerprintUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    
                    const rawRows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                    if (rawRows.length < 2) return showToast("الملف فارغ", "error");

                    const normalizeText = (t) => t ? t.toString().trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/\s+/g, ' ').toLowerCase() : "";

                    let headerIdx = 0;
                    for (let i = 0; i < Math.min(rawRows.length, 10); i++) {
                        const rowStr = rawRows[i].map(c => normalizeText(c)).join(' ');
                        if (rowStr.includes('كود') || rowStr.includes('تاريخ') || rowStr.includes('بصمه') || rowStr.includes('code') || rowStr.includes('date') || rowStr.includes('اسم') || rowStr.includes('حضور')) {
                            headerIdx = i;
                            break;
                        }
                    }

                    const headers = rawRows[headerIdx].map(h => normalizeText(h));
                    const parsedRecords = [];

                    for (let i = headerIdx + 1; i < rawRows.length; i++) {
                        const rowArray = rawRows[i];
                        if (!rowArray || rowArray.length === 0) continue;
                        
                        const row = {};
                        headers.forEach((h, idx) => {
                            if (h) row[h] = rowArray[idx];
                        });

                        const codeRaw = row['كود البصمه'] || row['كود'] || row['code'] || row['id'] || row['رقم الموظف'] || row['م'] || row['رقم'] || row['اسم الموظف'] || row['الاسم'] || row['اسم'] || row['name'];
                        const code = codeRaw?.toString().split('.')[0].trim(); // Handle float strings like "123.0"
                        const dateVal = row['التاريخ'] || row['date'] || row['تاريخ'] || row['يوم'];
                        const entry = row['وقت الدخول'] || row['حضور'] || row['entry'] || row['دخول'] || row['بصمه حضور'] || row['الحضور'] || row['in'] || row['time in'];
                        const exit = row['وقت الخروج'] || row['انصراف'] || row['exit'] || row['خروج'] || row['بصمه انصراف'] || row['الانصراف'] || row['out'] || row['time out'];
                        const lateVal = row['تاخير'] || row['late'];
                        const earlyVal = row['مبكر'] || row['early'];
                        const dedVal = row['خصم'] || row['deduction'];
                        const otVal = row['اضافي'] || row['ot'] || row['extra'];
                        const totalVal = row['اجمالي'] || row['total'];

                        const shiftVal = row['الوردية'] || row['shift'] || row['الورديه'];
                        let finalShift = shiftVal?.toString() || '';
                        Object.values(shifts).forEach(s => {
                            if (finalShift === s.name.split(' (')[0] || finalShift === s.name) {
                                finalShift = s.name;
                            }
                        });

                        if (!code || !dateVal) continue;

                        let emp = employees.find(e => e.code.toString().trim() === code || e.code.toString().trim().padStart(code.length, '0') === code || code.padStart(e.code.toString().trim().length, '0') === e.code.toString().trim());
                        if (!emp) {
                            emp = employees.find(e => normalizeText(e.name) === normalizeText(code));
                        }
                        if (!emp) continue;

                        let formattedDate;
                        try {
                            if (dateVal instanceof Date) {
                                // Use local date components to avoid timezone shifts
                                const d = dateVal;
                                formattedDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                            } else if (typeof dateVal === 'number') {
                                const d = XLSX.SSF.parse_date_code(dateVal);
                                formattedDate = `${d.y}-${String(d.m).padStart(2, '0')}-${String(d.d).padStart(2, '0')}`;
                            } else {
                                // Try parsing DD/MM/YYYY or DD-MM-YYYY
                                const dateStr = dateVal.toString().trim();
                                const parts = dateStr.split(/[\/\-.]/);
                                if (parts.length === 3) {
                                    let d, m, y;
                                    if (parts[0].length === 4) { // YYYY/MM/DD
                                        [y, m, d] = parts;
                                    } else { // DD/MM/YYYY
                                        [d, m, y] = parts;
                                    }
                                    const parsedDate = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
                                    if (!isNaN(parsedDate.getTime())) {
                                        formattedDate = `${parsedDate.getFullYear()}-${String(parsedDate.getMonth() + 1).padStart(2, '0')}-${String(parsedDate.getDate()).padStart(2, '0')}`;
                                    }
                                }
                                
                                if (!formattedDate) {
                                    const d = new Date(dateVal);
                                    if (!isNaN(d.getTime())) {
                                        formattedDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                                    } else {
                                        continue;
                                    }
                                }
                            }
                        } catch (err) { continue; }

                        const formatTime = (t) => {
                            if (t === undefined || t === null || t === '') return '';
                            if (t instanceof Date) return t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                            if (typeof t === 'number') {
                                const fraction = t % 1;
                                const totalSeconds = Math.round(fraction * 24 * 60 * 60);
                                const hours = Math.floor(totalSeconds / 3600);
                                const minutes = Math.floor((totalSeconds % 3600) / 60);
                                return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
                            }
                            if (typeof t === 'string') {
                                const timeMatch = t.match(/(\d{1,2}:\d{2}(?:\s?[APap][Mm])?)/);
                                if (timeMatch) {
                                    let timeStr = timeMatch[1];
                                    const isPM = timeStr.toLowerCase().includes('pm') || timeStr.toLowerCase().includes('م');
                                    const isAM = timeStr.toLowerCase().includes('am') || timeStr.toLowerCase().includes('ص');
                                    let [h, m] = timeStr.replace(/[^\d:]/g, '').split(':').map(Number);
                                    if (isPM && h < 12) h += 12;
                                    if (isAM && h === 12) h = 0;
                                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                                }
                                return t;
                            }
                            return '';
                        };

                        const arrivalTime = formatTime(entry);
                        const departureTime = formatTime(exit);

                        const d = calculateDeduction(arrivalTime, departureTime, finalShift, shifts, rules, formattedDate);

                        parsedRecords.push({
                            empId: emp.id,
                            empName: emp.name,
                            empCode: emp.code,
                            date: formattedDate,
                            arrivalTime,
                            departureTime,
                            lateDeduction: lateVal !== undefined ? parseFloat(lateVal) : d.late,
                            earlyDeduction: earlyVal !== undefined ? parseFloat(earlyVal) : d.early,
                            deduction: dedVal !== undefined ? parseFloat(dedVal) : d.total,
                            shift: finalShift || '',
                            lateHours: lateVal?.toString() || undefined,
                            earlyHours: earlyVal?.toString() || undefined,
                            overtimeHours: otVal?.toString() || undefined,
                            totalHours: totalVal?.toString() || undefined,
                            notes: row['ملاحظات'] || ''
                        });
                    }

                    if (parsedRecords.length === 0) {
                        return showToast("لم يتم العثور على بيانات صالحة للموظفين المسجلين. يرجى التأكد من وجود عمود 'كود' وعمود 'التاريخ' وتطابق الأكواد.", "error");
                    }
                    setPreviewData(parsedRecords);
                };
                reader.readAsBinaryString(file);
                e.target.value = null;
            };

            const confirmUpload = () => {
                const newLog = { ...attendanceLog };
                previewData.forEach(rec => {
                    if (!newLog[rec.date]) newLog[rec.date] = {};

                        departureTime: rec.departureTime,
                        deduction: rec.deduction,
                        lateDeduction: rec.lateDeduction,
                        earlyDeduction: rec.earlyDeduction,
                        shift: rec.shift,
                        notes: rec.notes,
                        lateHours: rec.lateHours,
                        earlyHours: rec.earlyHours,
                        overtimeHours: rec.overtimeHours,
                        totalHours: rec.totalHours

            const updatePreviewRow = (idx, field, value) => {

                        newData[idx].arrivalTime,

                        newData[idx].shift,

                    newData[idx].lateDeduction = d.late;
                    newData[idx].earlyDeduction = d.early;
                    newData[idx].deduction = d.total;

                    newData[idx].lateHours = undefined;
                    newData[idx].earlyHours = undefined;
                    newData[idx].totalHours = undefined;
                    newData[idx].overtimeHours = undefined;
                }
                
                setPreviewData(newData);
            };

            const removePreviewRow = (idx) => {
                setPreviewData(previewData.filter((_, i) => i !== idx));

            return (

                    {previewData && (

                            <div className="bg-white w-full max-w-6xl rounded-[40px] shadow-2xl overflow-hidden animate-fade-in border border-slate-200 flex flex-col max-h-[90vh]">
                                <div className="p-4 sm:p-8 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                                    <div>
                                        <h3 className="text-xl sm:text-2xl font-black text-slate-800">مراجعة وتعديل بيانات البصمة</h3>
                                        <p className="text-slate-500 font-bold text-xs sm:text-sm">يمكنك تعديل المواعيد أو حذف السجلات قبل الحفظ</p>
                                    </div>
                                    <button onClick={() => setPreviewData(null)} className="p-2 sm:p-3 rounded-2xl hover:bg-rose-50 text-slate-400 hover:text-rose-500 transition-colors self-end sm:self-auto">
                                        <Icon name="x" size={24} />
                                    </button>
                                </div>
                                <div className="p-8 overflow-y-auto overflow-x-auto flex-1">
                                    <table className="w-full text-right border-collapse">
                                        <thead className="bg-slate-100 text-slate-500 text-[10px] font-black uppercase sticky top-0 z-10">
                                            <tr>
                                                <th className="px-4 py-3 border-b">الموظف</th>
                                                <th className="px-4 py-3 border-b">الوردية</th>
                                                <th className="px-4 py-3 border-b">التاريخ</th>
                                                <th className="px-4 py-3 border-b">حضور</th>
                                                <th className="px-4 py-3 border-b">انصراف</th>
                                                <th className="px-4 py-3 border-b text-center">تأخير (س)</th>
                                                <th className="px-4 py-3 border-b text-center">مبكر (س)</th>
                                                <th className="px-4 py-3 border-b text-center">خصم</th>
                                                <th className="px-4 py-3 border-b">ملاحظات</th>
                                                <th className="px-4 py-3 border-b text-center">إجراء</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {previewData.map((rec, idx) => (
                                                <tr key={idx} className="hover:bg-blue-50/30">
                                                    <td className="px-4 py-3"><span className="font-black block text-xs">{rec.empName}</span><span className="text-[9px] text-slate-400">كود: {rec.empCode}</span></td>
                                                    <td className="px-4 py-3">
                                                        <select 
                                                            value={rec.shift || ''} 
                                                            onChange={(e) => updatePreviewRow(idx, 'shift', e.target.value)}
                                                            className="w-16 bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 outline-none appearance-none"
                                                        >
                                                            <option value="">اختر</option>
                                                            {Object.values(shifts).map(s => (
                                                                <option key={s.id} value={s.name}>{s.name}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    <td className="px-4 py-3 text-xs font-bold">{rec.date}</td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time" 
                                                            value={rec.arrivalTime} 
                                                            onChange={(e) => updatePreviewRow(idx, 'arrivalTime', e.target.value)}
                                                            className="bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 outline-none focus:ring-1 focus:ring-blue-400"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="time" 
                                                            value={rec.departureTime} 
                                                            onChange={(e) => updatePreviewRow(idx, 'departureTime', e.target.value)}
                                                            className="bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 outline-none focus:ring-1 focus:ring-blue-400"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={rec.lateDeduction || 0} 
                                                            onChange={(e) => updatePreviewRow(idx, 'lateDeduction', e.target.value)}
                                                            className="w-12 bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 text-center outline-none"
                                                        />

                                                    <td className="px-4 py-3 text-center">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={rec.earlyDeduction || 0} 
                                                            onChange={(e) => updatePreviewRow(idx, 'earlyDeduction', e.target.value)}
                                                            className="w-12 bg-slate-50 p-1.5 rounded-lg text-[10px] font-bold border border-slate-100 text-center outline-none"
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <span className={`px-3 py-1 rounded-full font-black text-[10px] ${rec.deduction > 0 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                            {rec.deduction} س
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-3">
                                                        <input 
                                                            type="text" 
                                                            value={rec.notes} 
                                                            onChange={(e) => updatePreviewRow(idx, 'notes', e.target.value)}
                                                            className="w-full bg-transparent border-b text-[10px] outline-none"
                                                            placeholder="..."
                                                        />
                                                    </td>
                                                    <td className="px-4 py-3 text-center">
                                                        <button onClick={() => removePreviewRow(idx)} className="p-2 text-rose-500 hover:bg-rose-100 rounded-lg transition-colors">
                                                            <Icon name="trash-2" size={14} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-8 bg-slate-50 border-t border-slate-100 flex gap-4">
                                    <button onClick={confirmUpload} className="flex-1 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-2">
                                        <Icon name="check-circle" size={20} /> تأكيد وحفظ {previewData.length} سجل
                                    </button>
                                    <button onClick={() => setPreviewData(null)} className="px-8 bg-white text-slate-500 font-black py-4 rounded-2xl border border-slate-200 hover:bg-slate-50 transition-all">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 no-print">
                        <div className="space-y-2">
                            <h2 className="text-3xl sm:text-4xl font-black text-slate-800 flex items-center gap-4 tracking-tighter">
                                <div className="p-3 bg-blue-600 text-white rounded-2xl shadow-lg shadow-blue-500/20">
                                    <Icon name="clock" size={32} />
                                </div>
                                الحضور والانصراف اليومي
                            </h2>
                            <p className="text-slate-500 font-bold tracking-wide">تسجيل المواعيد وتطبيق اللائحة الذكية</p>
                            <div className="inline-flex items-center gap-2 bg-blue-50 border border-blue-100 px-5 py-2 rounded-2xl">
                                <Icon name="info" size={18} className="text-blue-600" />
                                <span className="text-xs font-black text-blue-700 uppercase tracking-widest">دورة الشهر: من 26 إلى 25 من الشهر التالي</span>

                            >

                            >

                            <div className="flex items-center gap-4 bg-white p-3 rounded-2xl shadow-xl border border-slate-50">

                                <input type="date" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} className="outline-none font-black text-slate-800 bg-transparent text-lg tracking-tighter" />

                    {/* Quick Search Bar */}
                    <div className="relative group no-print">

                        <input

                                            return (

                                                        <input type="time" value={record.arrivalTime} onChange={(e) => updateRecord(emp.id, 'arrivalTime', e.target.value)} className="bg-slate-50 p-2 rounded-xl text-xs font-black text-slate-700 border border-slate-200" />
                                                    </td>
                                                    <td className="px-4 py-4">
                                                        <input type="time" value={record.departureTime} onChange={(e) => updateRecord(emp.id, 'departureTime', e.target.value)} className="bg-slate-50 p-2 rounded-xl text-xs font-black text-slate-700 border border-slate-200" />
                                                    </td>
                                                    <td className="px-4 py-4 text-center">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={record.lateDeduction || 0} 
                                                            onChange={(e) => updateRecord(emp.id, 'lateDeduction', e.target.value)} 
                                                            className="w-16 bg-slate-50 p-2 rounded-xl text-xs font-black text-black border border-slate-100 text-center" 
                                                        />
                                                    </td>
                                                    <td className="px-4 py-4 text-center">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={record.earlyDeduction || 0} 
                                                            onChange={(e) => updateRecord(emp.id, 'earlyDeduction', e.target.value)} 
                                                            className="w-16 bg-slate-50 p-2 rounded-xl text-xs font-black text-black border border-slate-100 text-center" 
                                                        />
                                                    </td>
                                                    <td className="px-4 py-4 text-center">
                                                        <span className={`px-4 py-2 rounded-2xl font-black text-xs ${record.deduction > 0 ? 'bg-rose-100 text-rose-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                            {record.deduction} س
                                                        </span>
                                                    </td>
                                                    <td className="px-4 py-4">
                                                        <input 
                                                            type="text" 
                                                            value={record.notes} 
                                                            onChange={(e) => updateRecord(emp.id, 'notes', e.target.value)} 
                                                            className="w-full bg-slate-50 p-2 rounded-xl text-xs font-black text-black border border-slate-100 text-right focus:bg-slate-100" 
                                                            placeholder="..."
                                                        />
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MonthlyReport = ({ employees, attendanceLog, setAttendanceLog, shifts, rules, showToast }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7));
            const [selectedEmpId, setSelectedEmpId] = useState('all');
            const [customRange, setCustomRange] = useState(false);
            const [startDateStr, setStartDateStr] = useState('');
            const [endDateStr, setEndDateStr] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            const monthData = useMemo(() => {
                let startDate, endDate;
                if (customRange && startDateStr && endDateStr) {
                    startDate = new Date(startDateStr);
                    endDate = new Date(endDateStr);
                } else {
                    const [year, month] = selectedMonth.split('-').map(Number);
                    startDate = new Date(year, month - 2, 26); 
                    endDate = new Date(year, month - 1, 25);  
                }
                
                const days = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    days.push(new Date(current));
                    current.setDate(current.getDate() + 1);
                }
                return days;
            }, [selectedMonth, customRange, startDateStr, endDateStr]);

            const getDayName = (date) => {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                return days[date.getDay()];
            };

            const reportRecords = useMemo(() => {
                const emps = selectedEmpId === 'all' 
                    ? employees.filter(emp => emp.name.toLowerCase().includes(searchQuery.toLowerCase()) || emp.code.toLowerCase().includes(searchQuery.toLowerCase()))
                    : employees.filter(e => e.id === selectedEmpId);
                
                return emps.map(emp => {
                    const records = monthData.map((dateObj, idx) => {
                        const dateStr = dateObj.toISOString().split('T')[0];
                        const record = (attendanceLog[dateStr] && attendanceLog[dateStr][emp.id]) || null;
                        
                        // Calculate Late/Early/Total for the report
                        const empShift = record?.shift || emp.shift || Object.values(shifts)[0].name;
                        const details = calculateDetailedAttendance(record?.arrivalTime, record?.departureTime, empShift, shifts, rules, dateStr);

                        return { 
                            no: idx + 1,
                            date: dateStr, 
                            day: getDayName(dateObj),
                            in: record?.arrivalTime || '',
                            out: record?.departureTime || '',
                            total: record?.totalHours !== undefined ? record.totalHours : details.total,
                            late: record?.lateHours !== undefined ? record.lateHours : details.late,
                            early: record?.earlyHours !== undefined ? record.earlyHours : details.early,
                            lateDed: record?.lateDeduction || 0,
                            earlyDed: record?.earlyDeduction || 0,
                            shift: empShift,
                            ded: record?.deduction !== undefined ? record.deduction : (record ? calculateDeduction(record.arrivalTime, record.departureTime, empShift, shifts, rules, dateStr).total : 0),
                            ot: record?.overtimeHours !== undefined ? record.overtimeHours : details.ot,
                            notes: record?.notes || '',
                            isWeekend: dateObj.getDay() === 5 || dateObj.getDay() === 6
                        };
                    });

                    const totalDeduction = records.reduce((acc, curr) => acc + Number(curr.ded), 0);
                    const presentDays = records.filter(r => r.in).length;
                    const totalOTMin = records.reduce((acc, curr) => {
                        if (!curr.ot || curr.ot === '0:00') return acc;
                        const [h, m] = curr.ot.split(':').map(Number);
                        return acc + (h * 60 + m);
                    }, 0);
                    const totalOTStr = `${Math.floor(totalOTMin / 60)}:${(totalOTMin % 60).toString().padStart(2, '0')}`;

                    return { emp, records, totalDeduction, presentDays, totalOTStr };
                });
            }, [employees, attendanceLog, selectedMonth, selectedEmpId, customRange, startDateStr, endDateStr]);

            const monthName = useMemo(() => {
                if (customRange && startDateStr && endDateStr) {
                    return `${startDateStr} to ${endDateStr}`;
                }
                const [year, month] = selectedMonth.split('-').map(Number);
                return new Date(year, month - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
            }, [selectedMonth, customRange, startDateStr, endDateStr]);

            const updateReportRecord = (date, empId, field, value) => {
                const newLog = { ...attendanceLog };
                if (!newLog[date]) newLog[date] = {};
                if (!newLog[date][empId]) newLog[date][empId] = { arrivalTime: '', departureTime: '', deduction: 0, lateDeduction: 0, earlyDeduction: 0, shift: '', notes: '' };
                
                if (field === 'shift') {
                    Object.values(shifts).forEach(s => {
                        if (value === s.name.split(' (')[0] || value === s.name) {
                            value = s.name;
                        }
                    });
                }
                newLog[date][empId] = { ...newLog[date][empId], [field]: value };
                
                if (field === 'lateDeduction' || field === 'earlyDeduction') {
                    newLog[date][empId].deduction = (parseFloat(newLog[date][empId].lateDeduction) || 0) + (parseFloat(newLog[date][empId].earlyDeduction) || 0);
                } else if (field === 'arrivalTime' || field === 'departureTime' || field === 'shift') {
                    const d = calculateDeduction(
                        newLog[date][empId].arrivalTime, 
                        newLog[date][empId].departureTime, 
                        newLog[date][empId].shift || employees.find(e => e.id === empId)?.shift || Object.values(shifts)[0].name, 
                        shifts, 
                        rules,
                        date
                    );
                    newLog[date][empId].lateDeduction = d.late;
                    newLog[date][empId].earlyDeduction = d.early;
                    newLog[date][empId].deduction = d.total;
                    
                    // Clear excel-imported hours so they are recalculated dynamically
                    newLog[date][empId].lateHours = undefined;
                    newLog[date][empId].earlyHours = undefined;
                    newLog[date][empId].totalHours = undefined;
                    newLog[date][empId].overtimeHours = undefined;
                }
                
                setAttendanceLog(newLog);
                localStorage.setItem('hr_attendance', JSON.stringify(newLog));
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12 bg-white min-h-screen">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 no-print p-8 bg-slate-50 border-b">
                        <div>
                            <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                                <Icon name="file-bar-chart" className="text-indigo-600" size={32} /> تقرير الحضور التفصيلي
                            </h2>
                            <p className="text-slate-500 font-bold">نموذج التقرير المعتمد للموظفين</p>
                        </div>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="flex items-center gap-2 bg-white border p-1 rounded-xl shadow-sm">
                                <button 
                                    onClick={() => setCustomRange(!customRange)} 
                                    className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-all ${customRange ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                                >
                                    {customRange ? 'فترة مخصصة' : 'دورة شهرية'}
                                </button>
                                
                                {!customRange ? (
                                    <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="outline-none font-bold text-slate-700 bg-transparent text-sm px-2" />
                                ) : (
                                    <div className="flex items-center gap-2 px-2">
                                        <input type="date" value={startDateStr} onChange={(e) => setStartDateStr(e.target.value)} className="outline-none font-bold text-slate-700 bg-transparent text-xs" />
                                        <span className="text-slate-300 text-[10px]">إلى</span>
                                        <input type="date" value={endDateStr} onChange={(e) => setEndDateStr(e.target.value)} className="outline-none font-bold text-slate-700 bg-transparent text-xs" />
                                    </div>
                                )}
                            </div>

                            <div className="relative w-full sm:w-auto">
                                <Icon name="search" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="بحث بالاسم أو الكود..." 
                                    className="w-full sm:w-auto bg-white border border-slate-200 rounded-xl py-2 pr-10 pl-4 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all md:w-48"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>

                            <select value={selectedEmpId} onChange={(e) => setSelectedEmpId(e.target.value)} className="bg-white border p-2.5 rounded-xl font-bold outline-none text-sm">
                                <option value="all">كافة الموظفين</option>
                                {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="space-y-12 print:space-y-0 max-w-[1200px] mx-auto p-4 md:p-8 print:p-0">
                        {reportRecords
                            .filter(({ emp }) => emp.name.toLowerCase().includes(searchQuery.toLowerCase()) || emp.code.toLowerCase().includes(searchQuery.toLowerCase()))
                            .map(({ emp, records, totalDeduction, presentDays, totalOTStr }) => (
                            <div key={emp.id} id={`report-${emp.id}`} className="report-container bg-white text-slate-900" style={{ pageBreakAfter: 'always' }}>
                                {/* Report Header Matching Image */}
                                <div className="text-center space-y-1 mb-4 print:mb-0.5 print:space-y-0">
                                    <h1 className="text-xl print:text-sm font-bold uppercase tracking-widest">Monthly Attendance Report</h1>
                                    <p className="text-sm font-bold">{customRange ? `${startDateStr} to ${endDateStr}` : monthName}</p>
                                </div>

                                <div className="flex justify-between items-end mb-4 px-2 print:mb-0.5">
                                    <div className="space-y-1 text-sm print:text-[10px] font-bold">
                                        <p>Employee Name: <span className="border-b border-slate-300 px-4 inline-block min-w-[200px]">{emp.name}</span></p>
                                        <p>No.: <span className="border-b border-slate-300 px-4 inline-block min-w-[100px]">{emp.code}</span></p>
                                    </div>
                                    <div className="text-sm print:text-[10px] font-bold">
                                        <p>Month: <span className="border-b border-slate-300 px-4 inline-block min-w-[150px]">{monthName}</span></p>
                                    </div>
                                </div>

                                <div className="overflow-x-auto border border-slate-300 report-table-wrapper">
                                    <table className="w-full text-center text-[11px] print:text-[9px] border-collapse">
                                        <thead>
                                            <tr className="bg-slate-100 border-b border-slate-300">
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-6">م</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-16">التاريخ</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-16">اليوم</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">الوردية</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">دخول</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">خروج</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">إجمالي</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">تأخير</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">مبكر</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">خصم</th>
                                                <th className="border-r border-slate-300 py-2 print:py-0.5 w-12">إضافي</th>
                                                <th className="py-2 print:py-0.5">ملاحظات</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {records.map((r) => (
                                                <tr key={r.date} className={`border-b border-slate-300 ${r.isWeekend ? 'bg-emerald-50/70' : ''} print:leading-tight`}>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-slate-900">{r.no}</td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-slate-900">{new Date(r.date).toLocaleDateString('en-GB')}</td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-slate-900">{r.day}</td>
                                                    <td className="border-r border-slate-200 py-1 print:py-0">
                                                        <select 
                                                            value={r.shift} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'shift', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-black appearance-none"
                                                        >
                                                            <option value="">اختر</option>
                                                            {Object.values(shifts).map(s => (
                                                                <option key={s.id} value={s.name}>{s.name}</option>
                                                            ))}
                                                        </select>
                                                    </td>
                                                    <td className="border-r border-slate-200 py-1 print:py-0">
                                                        <input 
                                                            type="time" 
                                                            value={r.in} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'arrivalTime', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-black"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-200 py-1 print:py-0">
                                                        <input 
                                                            type="time" 
                                                            value={r.out} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'departureTime', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-black"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-slate-900">
                                                        <input 
                                                            type="text" 
                                                            value={r.total} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'totalHours', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-slate-900"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-rose-600">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={r.lateDed || 0} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'lateDeduction', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-rose-600"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-rose-600">
                                                        <input 
                                                            type="number" 
                                                            step="0.5"
                                                            value={r.earlyDed || 0} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'earlyDeduction', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-rose-600"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-rose-700">
                                                        <input 
                                                            type="number" 
                                                            value={r.ded} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'deduction', parseFloat(e.target.value) || 0)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-rose-700"
                                                        />
                                                    </td>
                                                    <td className="border-r border-slate-300 py-1 print:py-0 font-black text-emerald-600">
                                                        <input 
                                                            type="text" 
                                                            value={r.ot} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'overtimeHours', e.target.value)}
                                                            className="w-full text-center bg-transparent outline-none focus:bg-blue-50 print:text-[8px] print:h-auto font-black text-emerald-600"
                                                        />
                                                    </td>
                                                    <td className="py-1 print:py-0 text-right px-2 text-[9px] bg-slate-100/50 print:bg-slate-200/50">
                                                        <input 
                                                            type="text" 
                                                            value={r.notes} 
                                                            onChange={(e) => updateReportRecord(r.date, emp.id, 'notes', e.target.value)}
                                                            className="w-full text-right bg-transparent outline-none focus:bg-slate-200 print:text-[8px] print:h-auto font-black text-black"
                                                            placeholder="..."
                                                        />
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div className="mt-4 print:mt-0.5 flex justify-between px-10 print:px-2">
                                    <div className="bg-rose-50 p-3 rounded-xl border border-rose-100 no-print">
                                        <p className="text-[9px] font-black text-rose-600 uppercase">إجمالي الخصم</p>
                                        <p className="text-xl font-black text-rose-700">{totalDeduction} ساعة</p>
                                    </div>
                                    <div className="bg-indigo-50 p-3 rounded-xl border border-indigo-100 no-print">
                                        <p className="text-[9px] font-black text-indigo-600 uppercase">إجمالي الإضافي</p>
                                        <p className="text-xl font-black text-indigo-700">{totalOTStr}</p>
                                    </div>
                                    <div className="hidden print:block text-lg font-black space-y-2 border-t-2 border-slate-900 pt-4">
                                        <p className="flex justify-between gap-8"><span>إجمالي الخصم:</span> <span className="text-rose-700">{totalDeduction} ساعة</span></p>
                                        <p className="flex justify-between gap-8"><span>إجمالي الإضافي:</span> <span className="text-emerald-700">{totalOTStr}</span></p>
                                    </div>
                                </div>

                                <div className="flex-1"></div>
                                <div className="print-only print-signatures px-8 pb-8">
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SettlementModal = ({ emp, month, record, onSave, onClose }) => {
            const [settlements, setSettlements] = useState(record.settlements || []);
            
            const addItem = (suggestedTitle = '') => {
                setSettlements([...settlements, { id: Date.now(), title: suggestedTitle, amount: 0, type: 'addition' }]);
            };

            const updateItem = (id, field, value) => {
                setSettlements(settlements.map(s => s.id === id ? { ...s, [field]: value } : s));
            };

            const removeItem = (id) => {
                setSettlements(settlements.filter(s => s.id !== id));
            };

            const handleSave = () => {
                const totalAdd = settlements.filter(s => s.type === 'addition').reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
                const totalDed = settlements.filter(s => s.type === 'deduction').reduce((acc, curr) => acc + (parseFloat(curr.amount) || 0), 0);
                onSave({ settlements, adjAddition: totalAdd, adjDeduction: totalDed });
            };

            return (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
                    <div className="bg-white w-full max-w-3xl rounded-[40px] shadow-2xl overflow-hidden animate-fade-in border border-slate-200">
                        <div className="p-4 sm:p-8 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                            <div>
                                <h3 className="text-xl sm:text-2xl font-black text-slate-800">إدارة تسويات الموظف</h3>
                                <p className="text-slate-500 font-bold text-xs sm:text-sm">{emp.name} - شهر {month}</p>
                            </div>
                            <button onClick={onClose} className="p-2 sm:p-3 rounded-2xl hover:bg-rose-50 text-slate-400 hover:text-rose-500 transition-colors self-end sm:self-auto">
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        <div className="p-8 max-h-[60vh] overflow-y-auto space-y-6">
                            <div className="flex gap-2 flex-wrap">
                                <span className="text-xs font-black text-slate-400 w-full mb-1">تسويات سريعة:</span>
                                {['زيادة مرتب', 'مكافأة تميز', 'بدل سكن', 'تسوية فروقات', 'ساعات إضافية', 'خصم غياب', 'سلفة'].map(label => (
                                    <button 
                                        key={label} 
                                        onClick={() => addItem(label)}
                                        className="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black border border-indigo-100 hover:bg-indigo-600 hover:text-white transition-all"
                                    >
                                        + {label}
                                    </button>
                                ))}
                            </div>

                            <div className="space-y-4">
                                {settlements.length === 0 ? (
                                    <div className="text-center py-10 text-slate-300 font-bold italic">لا توجد تسويات مسجلة لهذا الشهر</div>
                                ) : (
                                    settlements.map((s) => (
                                        <div key={s.id} className="flex flex-col md:flex-row gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100 items-center animate-fade-in">
                                            <select 
                                                value={s.type}

        const PayslipModal = ({ emp, month, record, onClose }) => {
            const calculateTotals = (record) => {
                const r = record || {};
                const additions = (r.grossSalary || 0) + (r.adjAddition || 0);
                const deductions = (r.leaveVal || 0) + (r.penaltyVal || 0) + (r.absenceVal || 0) + (r.lateVal || 0) + (r.earlyVal || 0) + (r.advanceInstallment || 0) + (r.adjDeduction || 0);
                return { additions, deductions, net: additions - deductions };
            };
            const { additions, deductions, net } = calculateTotals(record);

            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
                    <div className="bg-white w-full max-w-3xl rounded-[40px] shadow-2xl overflow-hidden animate-fade-in border border-slate-200">

                        <div id="payslip-content" className="p-6 md:p-12 payslip-box print:p-8 overflow-y-auto max-h-[75vh] print:max-h-none print:overflow-visible bg-white">
                            {/* Header Section */}

                                                <span className="text-slate-600">{s.title || 'تسوية إضافية'}:</span>

                                        <div className="flex justify-between items-center pt-4">

                                <div>

                                            </div>
                                        )}
                                        {record.settlements?.filter(s => s.type === 'deduction').map(s => (
                                            <div key={s.id} className="flex justify-between items-center border-b border-slate-100 pb-2">
                                                <span className="text-slate-600">{s.title || 'تسوية خصم'}:</span>

                                        <div className="flex justify-between items-center pt-4">

                            {/* Net Salary Box */}
                            <div className="mt-8 md:mt-12 bg-slate-900 text-white p-6 md:p-10 flex flex-col md:flex-row justify-between items-center gap-4 rounded-3xl shadow-2xl print:mt-10 print:p-8 print:rounded-none net-salary-box-print print:flex-row">
                                <div className="space-y-1 md:space-y-2 text-center md:text-right">
                                    <span className="text-xl md:text-2xl font-black uppercase tracking-[0.15em] block print:text-2xl">صافي الراتب المستحق</span>

                                    <p className="text-slate-700 text-sm font-bold leading-relaxed whitespace-pre-wrap">{record.notes}</p>

                            <div className="flex-1"></div>

                            </div>
                            
                            <div className="mt-10 md:mt-16 flex flex-col md:flex-row justify-between gap-8 md:gap-0 text-[11px] font-bold text-slate-400 border-t border-slate-100 pt-6 md:pt-8 print:hidden">
                                <div className="text-center space-y-4">
