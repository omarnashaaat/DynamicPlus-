        const Calendar = ({ employees, calendarEvents, setCalendarEvents }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [eventForm, setEventForm] = useState({ title: 'Sprint Review', date: new Date().toISOString().split('T')[0], type: 'MEETING' });
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const goToToday = () => setCurrentDate(new Date());

            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            const dayNames = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysCount = daysInMonth(year, month);
                const firstDay = firstDayOfMonth(year, month);
                const offset = (firstDay + 1) % 7;
                const days = [];
                const prevMonthDaysCount = daysInMonth(year, month - 1);
                for (let i = offset - 1; i >= 0; i--) {
                    days.push({ day: prevMonthDaysCount - i, month: month - 1, year, current: false });
                }
                for (let i = 1; i <= daysCount; i++) {
                    days.push({ day: i, month, year, current: true });
                }
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) {
                    days.push({ day: i, month: month + 1, year, current: false });
                }
                return days;
            }, [currentDate]);

            const handleSubmit = () => {
                if (!eventForm.title) return;
                if (editingId) {
                    setCalendarEvents(calendarEvents.map(e => e.id === editingId ? { ...eventForm, id: editingId } : e));
                    setEditingId(null);
                } else {
                    setCalendarEvents([...calendarEvents, { ...eventForm, id: Date.now() }]);
                }
                setEventForm({ title: '', date: new Date().toISOString().split('T')[0], type: 'MEETING' });
                setShowAddModal(false);
            };

            const confirmDelete = () => {
                if (deleteConfirmId === 'all') {
                    setCalendarEvents([]);
                } else {
                    setCalendarEvents(calendarEvents.filter(e => e.id !== deleteConfirmId));
                }
                setDeleteConfirmId(null);
            };

            const startEdit = (event) => {
                setEventForm({ title: event.title, date: event.date, type: event.type });
                setEditingId(event.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const getEventsForDay = (day, month, year) => {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                return calendarEvents.filter(e => e.date === dateStr);
            };

            const eventColors = {
                'MEETING': 'bg-blue-200 text-blue-800 border-blue-300',
                'HOLIDAY': 'bg-emerald-200 text-emerald-800 border-emerald-300',
                'EVENT': 'bg-sky-200 text-sky-800 border-sky-300',
                'LEAVE': 'bg-indigo-100 text-indigo-700 border-indigo-200',
                'OTHER': 'bg-orange-200 text-orange-800 border-orange-300'
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                            <Icon name="calendar" className="text-indigo-600" size={32} /> التقويم الحالي
                        </h2>
                        <div className="flex gap-2">
                            <button onClick={() => setDeleteConfirmId('all')} className="bg-rose-50 text-rose-600 px-6 py-2.5 rounded-xl font-black border border-rose-100 shadow-sm hover:bg-rose-100 flex items-center gap-2">
                                <Icon name="trash-2" size={18} /> مسح الكل
                            </button>
                            {editingId && (
                                <button onClick={() => { setEditingId(null); setEventForm({ title: '', date: new Date().toISOString().split('T')[0], type: 'MEETING' }); }} className="bg-amber-50 text-amber-600 px-6 py-2.5 rounded-xl font-black border border-amber-100 shadow-sm hover:bg-amber-100 flex items-center gap-2">
                                    إلغاء التعديل
                                </button>
                            )}
                            <button onClick={() => setShowAddModal(true)} className="bg-white text-slate-700 px-6 py-2.5 rounded-xl font-black border border-slate-200 shadow-sm hover:bg-slate-50 flex items-center gap-2">
                                <Icon name="plus" size={18} /> إضافة عناصر للتقويم
                            </button>
                        </div>
                    </div>

                    <div className="bg-white rounded-[40px] p-8 shadow-2xl border border-slate-100">
                        <div className="flex flex-col md:flex-row gap-6 mb-8 items-end">
                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">التاريخ</label>
                                <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <Icon name="calendar" className="text-slate-400" size={20} />
                                    <input type="date" value={eventForm.date} onChange={e => setEventForm({...eventForm, date: e.target.value})} className="bg-transparent outline-none font-bold text-slate-700 w-full" />
                                </div>
                            </div>
                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">العنوان</label>
                                <input type="text" value={eventForm.title} onChange={e => setEventForm({...eventForm, title: e.target.value})} className="w-full bg-slate-50 p-3 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700" placeholder="Sprint Review" />
                            </div>
                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">النوع</label>
                                <select value={eventForm.type} onChange={e => setEventForm({...eventForm, type: e.target.value})} className="w-full bg-slate-50 p-3 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700 appearance-none">
                                    <option value="MEETING">اجتماع</option>
                                    <option value="HOLIDAY">إجازة رسمية</option>
                                    <option value="EVENT">فعالية</option>
                                    <option value="LEAVE">إجازة موظف</option>
                                    <option value="OTHER">أخرى</option>
                                </select>
                            </div>
                            <button onClick={handleSubmit} className={`${editingId ? 'bg-amber-500' : 'bg-indigo-600'} text-white px-8 py-3.5 rounded-2xl font-black shadow-lg hover:opacity-90 transition-all flex items-center gap-2`}>
                                <Icon name={editingId ? "save" : "plus"} size={20} /> {editingId ? 'حفظ التعديلات' : 'إضافة للتقويم'}
                            </button>
                        </div>

                        <div className="border rounded-2xl overflow-hidden">
                            <div className="bg-slate-400 p-4 flex justify-between items-center text-white">
                                <div className="flex gap-2">
                                    <button onClick={prevMonth} className="p-1 hover:bg-white/20 rounded">{'<<'}</button>
                                    <button onClick={prevMonth} className="p-1 hover:bg-white/20 rounded">{'<'}</button>
                                </div>
                                <h3 className="text-xl font-black cursor-pointer" onClick={goToToday}>
                                    {monthNames[currentDate.getMonth()]} {currentDate.getFullYear()} (اضغط للعودة للشهر الحالي)
                                </h3>
                                <div className="flex gap-2">
                                    <button onClick={nextMonth} className="p-1 hover:bg-white/20 rounded">{'>'}</button>
                                    <button onClick={nextMonth} className="p-1 hover:bg-white/20 rounded">{'>>'}</button>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-7 bg-slate-200 gap-px">
                                {dayNames.map(d => (
                                    <div key={d} className="bg-slate-300 p-2 text-center font-black text-slate-600 text-sm">{d}</div>
                                ))}
                                {calendarDays.map((d, i) => {
                                    const events = getEventsForDay(d.day, d.month, d.year);
                                    return (
                                        <div key={i} className={`min-h-[140px] p-2 bg-white border-slate-100 border-r border-b ${!d.current ? 'bg-slate-50/50 grayscale opacity-50' : ''}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <span className={`text-sm font-black ${d.current ? 'text-slate-700' : 'text-slate-400'}`}>{d.day}</span>
                                                {d.current && <Icon name="check-square" size={14} className="text-emerald-500" />}
                                            </div>
                                            <div className="space-y-1">
                                                {events.map(e => (
                                                    <div key={e.id} className={`group relative text-[9px] p-1.5 rounded border font-bold ${eventColors[e.type] || 'bg-slate-100'}`}>
                                                        <div className="truncate pr-4">[{e.type}] {e.title}</div>
                                                        <div className="absolute top-0 left-0 h-full flex items-center gap-0.5 px-1 bg-inherit opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => startEdit(e)} className="p-0.5 hover:text-indigo-600 transition-colors">
                                                                <Icon name="edit" size={10} />
                                                            </button>
                                                            <button onClick={() => setDeleteConfirmId(e.id)} className="p-0.5 hover:text-rose-600 transition-colors">
                                                                <Icon name="trash-2" size={10} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {deleteConfirmId && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 sm:p-6 overflow-y-auto">
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl max-w-sm w-full text-center border-4 border-rose-100 animate-fade-in">
                                <div className="w-20 h-20 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                                    <Icon name="alert-triangle" size={40} />
                                </div>
                                <h3 className="text-2xl font-black text-slate-800 mb-2">تأكيد الحذف</h3>
                                <p className="text-slate-500 font-bold mb-8">
                                    {deleteConfirmId === 'all' ? 'هل أنت متأكد من مسح كافة المواعيد والفعاليات من التقويم؟' : 'هل أنت متأكد من حذف هذا الحدث نهائياً؟'}
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={confirmDelete} className="flex-1 bg-rose-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-rose-700 transition-all">نعم، احذف</button>
                                    <button onClick={() => setDeleteConfirmId(null)} className="flex-1 bg-slate-100 text-slate-600 font-black py-4 rounded-2xl hover:bg-slate-200 transition-all">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Archive = ({ employees }) => {
            const [view, setView] = useState('folders');
            const [docsState, setDocsState] = useState({});
            const [searchQuery, setSearchQuery] = useState('');
            const docHeaders = ["صورة البطاقة", "إقرار استلام العمل", "أصل المؤهل الدراسي", "أصل شهادة الميلاد", "الكشف الطبي (111)", "صحيفة الحالة الجنائية", "الموقف من التجنيد", "الصور الشخصية (6)", "كعب العمل", "أصل العقد الموقع", "استمارة س1", "شهادة قياس المهارة", "تراخيص / نقابة", "الشهادة الصحية"];
            const toggleDoc = (empId, docIdx) => { const key = `${empId}-${docIdx}`; setDocsState(prev => ({ ...prev, [key]: !prev[key] })); };
            const folders = [{ id: 'hiring_docs', title: 'مسوغات التعيين', icon: 'folder-open', color: 'bg-amber-600' }, { id: 'contracts', title: 'أرشيف العقود', icon: 'file-text', color: 'bg-indigo-600' }, { id: 'insurance', title: 'مستندات التأمينات', icon: 'shield-check', color: 'bg-sky-600' }, { id: 'payroll_archive', title: 'سجلات الرواتب', icon: 'banknote', color: 'bg-emerald-600' }];
            if (view === 'folders') {
                return (
                    <div className="space-y-10 animate-fade-in">
                        <div className="flex justify-between items-center"><div><h2 className="text-3xl font-black text-slate-800">الأرشيف الرقمي</h2><p className="text-slate-500 font-bold uppercase tracking-widest text-xs">إدارة الوثائق والملفات الرسمية</p></div></div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">{folders.map(f => (<button key={f.id} onClick={() => f.id === 'hiring_docs' && setView('hiring_matrix')} className="group p-8 rounded-[50px] border-2 transition-all flex flex-col items-center text-center bg-white border-slate-100 hover:border-amber-400"><div className={`${f.color} p-6 rounded-[30px] text-white shadow-xl mb-6 group-hover:scale-110 transition-transform`}><Icon name={f.icon} size={40} /></div><h3 className="text-xl font-black text-slate-800">{f.title}</h3><p className="text-slate-400 text-[10px] font-bold mt-2 uppercase">اضغط للفتح</p></button>))}</div>
                    </div>
                );
            }
            return (
                <div className="space-y-6 animate-fade-in" key="archive-matrix">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 no-print">
                        <div>
                            <h2 className="text-2xl font-black text-slate-800">سجل استلام مسوغات التعيين</h2>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">متابعة الوثائق المكتملة لكل موظف</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center w-full md:w-auto">
                            <div className="relative w-full sm:w-auto">
                                <Icon name="search" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="بحث بالاسم أو الكود..." 
                                    className="w-full sm:w-auto bg-white border border-slate-200 rounded-2xl py-2 pr-10 pl-4 text-xs font-bold outline-none focus:ring-2 focus:ring-amber-500/20 transition-all md:w-64"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <button onClick={() => setView('folders')} className="w-full sm:w-auto px-6 py-3 bg-white text-slate-800 border-2 border-slate-200 rounded-2xl font-black">العودة للمجلدات</button>
                        </div>
                    </div>
                    <div className="rounded-[30px] shadow-2xl overflow-hidden border bg-white border-slate-200 print-container">
                        <div className="overflow-x-auto">
                            <table className="w-full text-center border-collapse">
                                <thead className="bg-slate-50 text-slate-700 text-[10px] font-black uppercase">
                                    <tr>
                                        <th className="px-3 py-6 border-b border-l min-w-[60px] sticky right-0 z-20 bg-slate-50 text-center leading-none">كود<br/>الموظف</th>
                                        <th className="px-4 py-6 border-b border-l min-w-[250px] sticky right-[60px] z-20 bg-slate-50 text-right">الاســــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــــم</th>
                                        <th className="px-2 py-6 border-b border-l min-w-[100px]">الإدارة</th>
                                        <th className="px-2 py-6 border-b border-l min-w-[120px]">الوظيفة</th>
                                        <th className="px-2 py-6 border-b border-l min-w-[90px]">التوظيف</th>
                                        {docHeaders.map((h, i) => (<th key={i} className="p-0 border-b border-l min-w-[50px] relative"><div className="writing-mode-vertical transform -rotate-180 h-48 flex items-center justify-center font-black leading-tight px-1 text-[9px]">{h}</div></th>))}

                                </thead>

        const EmployeeTable = ({ employees, onAddEmployee, onUpdateEmployee, onDeleteEmployee, onBulkAdd, setActiveTab, shifts }) => {
            const [showModal, setShowModal] = useState(false);
            const [editingEmp, setEditingEmp] = useState(null);
            const [viewingEmp, setViewingEmp] = useState(null);
            const [warningEmp, setWarningEmp] = useState(null);
            const [selectedDept, setSelectedDept] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const fileInputRef = useRef(null);
            const [formData, setFormData] = useState({ name: '', code: '', joinDate: '', department: '', jobTitle: '', nationalId: '', phone: '', address: '', shift: Object.values(shifts)[0]?.name || '' });
            
            const departmentsList = useMemo(() => ['all', ...new Set(employees.map(e => e.department).filter(Boolean))], [employees]);
            
            const filteredEmployees = useMemo(() => {
                let filtered = selectedDept === 'all' ? employees : employees.filter(e => e.department === selectedDept);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(e => 
                        e.name.toLowerCase().includes(q) || 
                        e.code.toString().includes(q)
                    );
                }
                return filtered;
            }, [employees, selectedDept, searchQuery]);
            const normalizeText = (t) => t ? t.toString().trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/\s+/g, ' ') : "";
            const handleExcelUpload = (e) => { 
                const file = e.target.files[0]; 
                if (!file) return; 
                const reader = new FileReader(); 
                reader.onload = (evt) => { 
                    const bstr = evt.target.result; 
                    const wb = XLSX.read(bstr, { type: 'binary', cellDates: true }); 
                    const ws = wb.Sheets[wb.SheetNames[0]]; 
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 }); 
                    if (rows.length < 2) return alert("الملف فارغ تماماً."); 
                    
                    // Find the header row (first row that contains 'اسم' or 'كود')
                    let headerIdx = 0;
                    for (let i = 0; i < Math.min(rows.length, 10); i++) {
                        const rowStr = rows[i].map(c => normalizeText(c)).join(' ');
                        if (rowStr.includes('اسم') || rowStr.includes('كود')) {
                            headerIdx = i;
                            break;
                        }
                    }

                    const headers = rows[headerIdx].map(h => normalizeText(h)); 
                    const f = (k, df) => { 
                        const idx = headers.findIndex(h => k.some(ki => h.includes(normalizeText(ki)))); 
                        return idx !== -1 ? idx : df; 
                    }; 
                    const m = { 
                        code: f(['كود', 'بصمه'], 1), 
                        joinDate: f(['تاريخ', 'تعيين'], 2), 
                        name: f(['اسم'], 3), 
                        department: f(['قسم', 'اداره'], 4), 
                        jobTitle: f(['مسمي'], 5), 
                        nationalId: f(['قومي'], 6), 
                        phone: f(['هاتف'], 7), 
                        address: f(['عنوان'], 8), 
                        shift: f(['ورديه', 'شفت'], 9) 
                    }; 
                    const res = rows.slice(headerIdx + 1).map(r => {
                        let joinDate = '';
                        const rawDate = r[m.joinDate];
                        if (rawDate instanceof Date) {
                            joinDate = rawDate.toISOString().split('T')[0];
                        } else if (rawDate) {
                            const d = new Date(rawDate);
                            if (!isNaN(d.getTime())) {
                                joinDate = d.toISOString().split('T')[0];
                            } else {
                                joinDate = rawDate.toString();
                            }
                        }
                        return { 
                            id: Math.random().toString(36).substr(2, 9), 
                            code: r[m.code]?.toString() || '', 
                            joinDate: joinDate, 
                            name: r[m.name]?.toString() || '', 
                            department: r[m.department]?.toString() || '', 
                            jobTitle: r[m.jobTitle]?.toString() || '', 
                            nationalId: r[m.nationalId]?.toString() || '', 
                            phone: r[m.phone]?.toString() || '', 
                            address: r[m.address]?.toString() || '', 
                            shift: r[m.shift]?.toString() || Object.values(shifts)[0]?.name || '', 
                            status: 'نشط', 
                            totalLeaves: 21, 
                            monthlyLeaves: Array(12).fill(0) 
                        };
                    }).filter(emp => {
                        if (!emp.name || !emp.code) return false;
                        const n = normalizeText(emp.name);
                        const c = normalizeText(emp.code);
                        // Skip if it looks like a header
                        if (n.includes('اسم') || n.includes('كامل') || n.includes('موظف')) return false;
                        if (c.includes('كود') || c.includes('بصمه') || c.includes('رقم')) return false;
                        if (n.includes('تاريخ') || n.includes('تعيين')) return false;
                        return true;
                    }); 
                    if (res.length) { 
                        onBulkAdd(res); 
                        alert(`تم استيراد بيانات ${res.length} موظف بنجاح.`); 
                    } 
                }; 
                reader.readAsBinaryString(file); 
                e.target.value = null; 
            };
            const handleSubmit = (e) => { e.preventDefault(); editingEmp ? onUpdateEmployee({ ...formData, id: editingEmp.id }) : onAddEmployee(formData); setShowModal(false); };
            return (
                <div className={`animate-fade-in ${warningEmp ? 'print:space-y-0 print:m-0 print:p-0' : 'space-y-6'}`}>
                    <div className={`flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${warningEmp ? 'print:hidden' : ''}`}><div><h2 className="text-2xl sm:text-3xl font-black text-slate-800">قائمة الموظفين</h2><p className="text-slate-500 font-bold">إدارة بيانات الكادر البشري في النظام</p></div><div className="flex flex-wrap items-center gap-3 w-full md:w-auto"><div className="relative w-full sm:w-auto"><Icon name="filter" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" /><select value={selectedDept} onChange={(e) => setSelectedDept(e.target.value)} className="w-full sm:w-auto pr-10 pl-4 py-2.5 rounded-2xl border-2 font-bold focus:outline-none bg-white border-slate-200 text-slate-700 appearance-none cursor-pointer"><option value="all">كافة الأقسام</option>{departmentsList.filter(d => d !== 'all').map(d => <option key={d} value={d}>{d}</option>)}</select></div><input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls" onChange={handleExcelUpload} />
<button onClick={() => fileInputRef.current.click()} className="flex-1 sm:flex-none justify-center px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg bg-emerald-50 text-emerald-700 border border-emerald-100"><Icon name="file-spreadsheet" size={20} /> استيراد Excel</button>
<button onClick={() => setActiveTab('attendance')} className="flex-1 sm:flex-none justify-center px-6 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg bg-blue-50 text-blue-700 border border-blue-100"><Icon name="fingerprint" size={20} /> رفع بيانات البصمة</button>
<button onClick={() => { setEditingEmp(null); setFormData({ name: '', code: '', joinDate: '', department: '', jobTitle: '', nationalId: '', phone: '', address: '', shift: Object.values(shifts)[0]?.name || '' }); setShowModal(true); }} className="w-full sm:w-auto justify-center bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition-all"><Icon name="plus" size={20} /> إضافة موظف جديد</button></div></div>
                    <div className={`rounded-[40px] shadow-xl overflow-hidden border bg-white border-slate-100 ${warningEmp ? 'print:hidden' : ''}`}>
                        <div className="overflow-x-auto">
                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-50 text-slate-500 text-[11px] font-black uppercase tracking-wider border-b border-slate-100"><tr><th className="px-4 py-5">م</th><th className="px-4 py-5">الكود</th><th className="px-4 py-5">تاريخ التعيين</th><th className="px-6 py-5">الاسم الكامل</th><th className="px-4 py-5">الإدارة</th><th className="px-4 py-5">المسمى الوظيفي</th><th className="px-4 py-5">الوردية</th><th className="px-6 py-5">الرقم القومي</th><th className="px-4 py-5 text-center">الإجراءات</th></tr></thead>
                                <tbody className="divide-y divide-slate-50">{filteredEmployees.length ? filteredEmployees.map((emp, index) => (<tr key={emp.id} className="hover:bg-indigo-500/5 transition-colors group"><td className="px-4 py-4 font-bold text-slate-500">{index + 1}</td><td className="px-4 py-4 font-mono font-black text-indigo-500">{emp.code}</td><td className="px-4 py-4 text-xs font-bold text-slate-500">{emp.joinDate}</td><td className="px-6 py-4 font-black text-base text-slate-800">{emp.name}</td><td className="px-4 py-4 text-sm font-bold text-slate-500">{emp.department}</td><td className="px-4 py-4 text-sm font-bold text-slate-500">{emp.jobTitle}</td><td className="px-4 py-4 text-[10px] font-bold text-indigo-600">{emp.shift || '---'}</td><td className="px-6 py-4 font-mono text-xs text-slate-500">{emp.nationalId}</td>                                                <td className="px-4 py-4 text-center">
                                                    <div className="flex justify-center items-center gap-2">
                                                        <button onClick={() => setViewingEmp(emp)} className="p-2 rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all" title="عرض الملف الشخصي"><Icon name="user" size={16} /></button>
                                                        <button onClick={() => setWarningEmp(emp)} className="p-2 rounded-lg bg-amber-500/10 text-amber-600 hover:bg-amber-500 transition-all hover:text-white" title="إنذار / ملاحظة"><Icon name="alert-triangle" size={16} /></button>
                                                        <button onClick={() => { setEditingEmp(emp); setFormData({ ...emp }); setShowModal(true); }} className="p-2 rounded-lg bg-indigo-500/10 text-indigo-500 hover:bg-indigo-500 transition-all hover:text-white"><Icon name="edit" size={16} /></button>
                                                        <button onClick={() => { if(confirm('حذف الموظف؟')) onDeleteEmployee(emp.id); }} className="p-2 rounded-lg bg-rose-500/10 text-rose-500 hover:bg-rose-500 transition-all hover:text-white"><Icon name="trash-2" size={16} /></button>
                                                    </div>
                                                </td>
</tr>)) : <tr><td colSpan="9" className="px-6 py-10 text-center text-slate-400 font-bold italic">لا توجد بيانات حالياً</td></tr>}</tbody>
                            </table>
                        </div>
                    </div>
                    {showModal && (<div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 sm:p-6 overflow-y-auto"><div className="my-auto w-full max-w-4xl p-6 sm:p-10 rounded-[30px] sm:rounded-[50px] shadow-2xl animate-fade-in border bg-white border-slate-200"><div className="flex justify-between items-center mb-8"><h3 className="text-2xl sm:text-3xl font-black text-slate-800">{editingEmp ? 'تعديل بيانات الموظف' : 'إضافة موظف جديد'}</h3><button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-rose-500"><Icon name="x" size={32} /></button></div><form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الاسم الكامل</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الكود الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.code} onChange={(e) => setFormData({...formData, code: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">تاريخ التعيين</label><input required type="date" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.joinDate} onChange={(e) => setFormData({...formData, joinDate: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الإدارة</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">المسمى الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.jobTitle} onChange={(e) => setFormData({...formData, jobTitle: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الرقم القومي</label><input required type="text" pattern="\d{14}" title="يجب إدخال 14 رقم" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.nationalId} onChange={(e) => setFormData({...formData, nationalId: e.target.value.replace(/\D/g, '')})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">رقم الهاتف</label><input required type="tel" pattern="01[0125]\d{8}" title="يجب إدخال رقم هاتف مصري صحيح" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value.replace(/[^\d+]/g, '')})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الوردية</label><select required className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.shift} onChange={(e) => setFormData({...formData, shift: e.target.value})}>{Object.values(shifts).map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select></div><div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-slate-500 uppercase">العنوان السكني</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} /></div><div className="md:col-span-3 pt-6"><button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-3xl text-xl shadow-xl hover:bg-indigo-700 transition-all">حفظ البيانات</button></div></form></div></div>)}
                    {viewingEmp && <EmployeeProfile employee={viewingEmp} employees={employees} onClose={() => setViewingEmp(null)} />}
                    {warningEmp && <WarningModal emp={warningEmp} onClose={() => setWarningEmp(null)} />}
                </div>
            );
        };

        const Recruitment = ({ employees }) => {
            const [activeSubTab, setActiveSubTab] = useState('board'); // 'board' or 'ats'
            const STAGES = [
                { id: 'applied', title: 'فرز السير الذاتية', color: 'border-slate-100' },
                { id: 'interview', title: 'المقابلات', color: 'border-blue-50' },
                { id: 'offer', title: 'العروض الوظيفية', color: 'border-emerald-50' },
                { id: 'rejected', title: 'مرفوض', color: 'border-rose-50' },
            ];

            const [candidates, setCandidates] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const fetchCandidates = async () => {
                try {
                    const response = await fetch('/api/candidates');
                    const data = await response.json();
                    setCandidates(data);
                    localStorage.setItem('hr_candidates_cache', JSON.stringify(data));
                } catch (err) {
                    console.error('Failed to fetch candidates:', err);
                    const cached = localStorage.getItem('hr_candidates_cache');
                    if (cached) {
                        setCandidates(JSON.parse(cached));
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchCandidates();
            }, []);

            const [searchQuery, setSearchQuery] = useState('');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingCandidate, setEditingCandidate] = useState(null);
            const [newCandidate, setNewCandidate] = useState({
                name: '',
                role: '',
                experience: '',
                priority: 'عادي'
            });

            const [pendingActions, setPendingActions] = useState(() => {
                const saved = localStorage.getItem('pending_candidates_actions');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                if (isOnline && pendingActions.length > 0) {
                    syncPendingActions();
                }
            }, [isOnline, pendingActions]);

            const syncPendingActions = async () => {
                const actions = [...pendingActions];
                const failed = [];
                
                for (const action of actions) {
                    try {
                        if (action.type === 'SAVE') {
                            await fetch('/api/candidates', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(action.data)
                            });
                        } else if (action.type === 'DELETE') {
                            await fetch(`/api/candidates/${action.id}`, { method: 'DELETE' });
                        }
                    } catch (err) {
                        failed.push(action);
                    }
                }
                
                setPendingActions(failed);
                localStorage.setItem('pending_candidates_actions', JSON.stringify(failed));
                if (failed.length === 0) {
                    fetchCandidates();
                }
            };

            const handleAddCandidate = async (e) => {
                e.preventDefault();
                const candidate = {
                    id: Date.now().toString(),
                    ...newCandidate,
                    email: '',
                    phone: '',
                    score: Math.floor(Math.random() * 30) + 60,
                    status: 'applied',
                    createdAt: Date.now(),
                    notes: ''
                };
                
                // Optimistic update
                setCandidates(prev => [candidate, ...prev]);
                setShowAddModal(false);
                setNewCandidate({ name: '', role: '', experience: '', priority: 'عادي' });

                try {
                    if (isOnline) {
                        await fetch('/api/candidates', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(candidate)
                        });
                    } else {
                        const newActions = [...pendingActions, { type: 'SAVE', data: candidate }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                } catch (err) {
                    const newActions = [...pendingActions, { type: 'SAVE', data: candidate }];
                    setPendingActions(newActions);
                    localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                }
            };

            const handleEditCandidate = async (e) => {
                e.preventDefault();
                if (!editingCandidate) return;
                
                // Optimistic update
                setCandidates(prev => prev.map(c => c.id === editingCandidate.id ? editingCandidate : c));
                setEditingCandidate(null);

                try {
                    if (isOnline) {
                        await fetch('/api/candidates', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(editingCandidate)
                        });
                    } else {
                        const newActions = [...pendingActions, { type: 'SAVE', data: editingCandidate }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                } catch (err) {
                    const newActions = [...pendingActions, { type: 'SAVE', data: editingCandidate }];
                    setPendingActions(newActions);
                    localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                }
            };

            const moveNext = async (id) => {
                const cand = candidates.find(c => c.id === id);
                if (!cand) return;
                
                const currentIndex = STAGES.findIndex(s => s.id === cand.status);
                if (currentIndex < STAGES.length - 1) {
                    const updatedCand = { ...cand, status: STAGES[currentIndex + 1].id };
                    
                    // Optimistic update
                    setCandidates(prev => prev.map(c => c.id === id ? updatedCand : c));

                    try {
                        if (isOnline) {
                            await fetch('/api/candidates', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(updatedCand)
                            });
                        } else {
                            const newActions = [...pendingActions, { type: 'SAVE', data: updatedCand }];
                            setPendingActions(newActions);
                            localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                        }
                    } catch (err) {
                        const newActions = [...pendingActions, { type: 'SAVE', data: updatedCand }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                }
            };

            const deleteCandidate = async (id) => {
                if (confirm('هل أنت متأكد من حذف هذا المرشح؟')) {
                    // Optimistic update
                    setCandidates(prev => prev.filter(c => c.id !== id));

                    try {
                        if (isOnline) {
                            await fetch(`/api/candidates/${id}`, { method: 'DELETE' });
                        } else {
                            const newActions = [...pendingActions, { type: 'DELETE', id }];
                            setPendingActions(newActions);
                            localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                        }
                    } catch (err) {
                        const newActions = [...pendingActions, { type: 'DELETE', id }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                }
            };

            const stats = [
                { label: 'إجمالي المرشحين', value: candidates.length, icon: 'users', color: 'text-blue-600', bg: 'bg-blue-50' },
                { label: 'مقابلات نشطة', value: candidates.filter(c => c.status === 'interview').length, icon: 'calendar', color: 'text-purple-600', bg: 'bg-purple-50' },
                { label: 'عروض معلقة', value: candidates.filter(c => c.status === 'offer').length, icon: 'check-circle', color: 'text-emerald-600', bg: 'bg-emerald-50' },
            ];

            return (
                <div className="space-y-6 animate-fade-in" dir="rtl">
                    <div className="flex flex-col md:flex-row items-center justify-between gap-4 bg-white/50 p-4 rounded-[40px] border border-white shadow-sm backdrop-blur-sm">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                                <Icon name="briefcase" size={20} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter">إدارة التوظيف</h1>
                                <div className="flex items-center gap-1.5 mt-0.5">
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]' : 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.4)]'}`}></div>
                                    <span className={`text-[10px] font-bold ${isOnline ? 'text-emerald-600' : 'text-rose-600'}`}>
                                        {isOnline ? 'متصل بالخادم' : 'وضع الأوفلاين - سيتم المزامنة لاحقاً'}
                                    </span>
                                    {pendingActions.length > 0 && (
                                        <span className="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 rounded-md border border-amber-100 animate-pulse">
                                            {pendingActions.length} عمليات معلقة
                                        </span>
                                    )}
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                            <button 
                                onClick={() => setActiveSubTab('board')}
                                className={`px-6 py-2 rounded-xl font-black transition-all ${activeSubTab === 'board' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                لوحة المتابعة
                            </button>
                            <button 
                                onClick={() => setActiveSubTab('ats')}
                                className={`px-6 py-2 rounded-xl font-black transition-all ${activeSubTab === 'ats' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                الماسح الذكي ATS
                            </button>
                        </div>

                        <div className="flex items-center gap-3">
                            <button onClick={() => setShowAddModal(true)} className="px-6 py-3 bg-indigo-600 text-white rounded-2xl font-black flex items-center gap-2 shadow-lg hover:bg-indigo-700 transition-all">
                                <Icon name="plus" size={18} />
                                <span>إضافة مرشح</span>
                            </button>
                        </div>
                    </div>

                    {activeSubTab === 'ats' ? (
                        <ATS onCandidateSaved={fetchCandidates} />
                    ) : (
                        <>
                            <div className="flex flex-wrap items-center justify-between gap-4">
                                <div className="relative flex-1 max-w-xl">
                                    <Icon name="search" size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                    <input 
                                        type="text" 
                                        placeholder="بحث سريع..." 
                                        className="w-full bg-white border border-slate-100 rounded-2xl py-3 pr-12 pl-4 text-sm font-bold focus:outline-none focus:ring-4 focus:ring-indigo-500/5 transition-all"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {stats.map((stat, i) => (
                            <div key={i} className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-all">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <p className="text-xs font-black text-slate-400 mb-1 uppercase tracking-wider">{stat.label}</p>
                                        <p className="text-3xl font-black text-slate-800">{stat.value}</p>
                                    </div>
                                    <div className={`w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner ${stat.bg} ${stat.color}`}>
                                        <Icon name={stat.icon} size={28} />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="flex gap-6 overflow-x-auto pb-6 min-h-[700px]">
                        {STAGES.map(stage => {
                            const stageCandidates = candidates.filter(c => {
                                const matchesStage = c.status === stage.id;
                                const matchesSearch = !searchQuery || 
                                    c.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    (c.role && c.role.toLowerCase().includes(searchQuery.toLowerCase()));
                                return matchesStage && matchesSearch;
                            });
                            return (
                                <div key={stage.id} className="flex-1 min-w-[320px] flex flex-col gap-4">
                                    <div className="flex items-center justify-between px-2">
                                        <h3 className="font-black text-slate-800 text-sm">{stage.title}</h3>
                                        <span className="bg-white border border-slate-100 px-3 py-1 rounded-xl text-[10px] font-black text-slate-400 shadow-sm">
                                            {stageCandidates.length}
                                        </span>
                                    </div>
                                    <div className={`flex-1 rounded-[40px] p-4 space-y-4 border-2 border-dashed transition-colors ${
                                        stage.id === 'applied' ? "bg-slate-50/30 border-slate-100" :
                                        stage.id === 'interview' ? "bg-blue-50/20 border-blue-100/50" :
                                        stage.id === 'offer' ? "bg-emerald-50/20 border-emerald-100/50" :
                                        "bg-rose-50/20 border-rose-100/50"
                                    }`}>
                                        {stageCandidates.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 gap-3 opacity-50">
                                                <Icon name="users" size={48} />
                                                <p className="font-black text-xs">لا يوجد مرشحين</p>
                                            </div>
                                        ) : (
                                            stageCandidates.map(cand => (
                                                <div key={cand.id} className="bg-white rounded-3xl p-5 border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all group relative overflow-hidden">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className={`px-3 py-1 rounded-lg text-[9px] font-black ${
                                                            cand.priority === 'عاجل' ? "bg-rose-100 text-rose-600" :
                                                            cand.priority === 'متوسط' ? "bg-amber-100 text-amber-600" :
                                                            "bg-blue-100 text-blue-600"
                                                        }`}>
                                                            {cand.priority}
                                                        </div>

            const extractText = async (file) => {
                const reader = new FileReader();
                return new Promise((resolve, reject) => {
                    reader.onload = async (e) => {
                        const content = e.target.result;
                        if (file.type === 'application/pdf') {
                            try {
                                const pdf = await pdfjsLib.getDocument({ data: content }).promise;
                                let text = '';
                                for (let i = 1; i <= pdf.numPages; i++) {
                                    const page = await pdf.getPage(i);
                                    const textContent = await page.getTextContent();
                                    // Improved text joining to prevent word breaking
                                    let lastY, textItems = [];
                                    for (let item of textContent.items) {
                                        if (lastY !== undefined && lastY !== item.transform[5]) {
                                            textItems.push('\n');
                                        }
                                        textItems.push(item.str);
                                        lastY = item.transform[5];
                                    }
                                    text += textItems.join(' ') + ' ';
                                }
                                resolve(text);
                            } catch (err) {
                                reject('خطأ في قراءة ملف PDF');
                            }
                        } else if (file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                            try {
                                const result = await mammoth.extractRawText({ arrayBuffer: content });
                                resolve(result.value);
                            } catch (err) {
                                reject('خطأ في قراءة ملف Word');
                            }
                        } else {
                            resolve(new TextDecoder().decode(content));
                        }
                    };
                    if (file.type === 'application/pdf' || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                        reader.readAsArrayBuffer(file);
                    } else {
                        reader.readAsText(file);
                    }
                });

            const analyzeWithGemini = async (cvText, jd) => {
                const apiKey = window.GEMINI_API_KEY;
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
                
                const prompt = `
                    أنت محرك ATS متطور وخبير موارد بشرية. مهمتك هي إجراء مقارنة دقيقة جداً بين الوصف الوظيفي والسيرة الذاتية.
                    
                    الوصف الوظيفي (المرجع):
                    ${jd}
                    
                    السيرة الذاتية (المصدر):
                    ${cvText}
                    
                    التعليمات الصارمة:
                    1. استخرج الكلمات المفتاحية والمهارات المطلوبة "فقط" من الوصف الوظيفي المعطى.
                    2. ابحث عن هذه الكلمات في نص السيرة الذاتية بدقة، مع مراعاة المترادفات (مثلاً: "Graphic Design" هي نفسها "تصميم جرافيك").
                    3. لا تضع أي كلمة في "missingKeywords" إذا كانت موجودة بالفعل في السيرة الذاتية أو لها ذكر واضح.
                    4. تأكد أن "missingKeywords" هي كلمات "موجودة في الوصف الوظيفي" ولكنها "غائبة تماماً عن السيرة الذاتية".
                    
                    المطلوب هو إرجاع النتيجة بتنسيق JSON فقط كالتالي:
                    {
                        "score": (رقم من 0 إلى 100 يمثل نسبة التوافق الكلية),
                        "skillsScore": (رقم من 0 إلى 100 لتطابق المهارات),
                        "contextScore": (رقم من 0 إلى 100 للخبرة والكلمات المفتاحية),
                        "formattingScore": (رقم من 0 إلى 100 لجودة التنسيق),
                        "summary": (ملخص قصير جداً للمرشح),
                        "classification": ("قوي" أو "متوسط" أو "ضعيف"),
                        "name": (اسم المرشح من السيرة الذاتية),
                        "experience": (سنوات الخبرة المستخلصة، مثال: "5 سنوات"),
                        "email": (البريد الإلكتروني إن وجد),
                        "phone": (رقم الهاتف إن وجد),
                        "foundKeywords": [قائمة بالكلمات المفتاحية التي تم العثور عليها فعلياً في السيرة الذاتية بناءً على الوصف الوظيفي],
                        "missingKeywords": [قائمة بالكلمات المفتاحية الجوهرية المطلوبة في الوصف الوظيفي وغير موجودة تماماً في السيرة الذاتية],
                        "recommendations": [قائمة بنصائح محددة للمرشح لتحسين سيرته الذاتية لهذا المنصب]
                    }
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]

                    const data = await response.json();

                        formattingScore: 0, 
                        summary: 'خطأ في التحليل',
