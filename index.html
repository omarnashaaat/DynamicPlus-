                    </div>
                </div>
            );
        };

        const Payroll = ({ employees, payrollRecords, setPayrollRecords, attendanceLog, insuranceRecords, setActiveTab, rules, showToast }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toISOString().slice(0, 7)); 
            const [settlementTarget, setSettlementTarget] = useState(null);
            const [payslipTarget, setPayslipTarget] = useState(null);
            const [customRange, setCustomRange] = useState(false);
            const [startDateStr, setStartDateStr] = useState('');
            const [endDateStr, setEndDateStr] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            // Link Attendance Deductions Automatically
            useEffect(() => {
                let startDate, endDate;
                if (customRange && startDateStr && endDateStr) {
                    startDate = new Date(startDateStr);
                    endDate = new Date(endDateStr);
                } else {
                    const [year, month] = selectedMonth.split('-').map(Number);
                    startDate = new Date(year, month - 2, 26);
                    endDate = new Date(year, month - 1, 25);
                }
                
                const days = [];
                let current = new Date(startDate);
                while (current <= endDate) {
                    days.push(current.toISOString().split('T')[0]);
                    current.setDate(current.getDate() + 1);
                }

                const updatedRecords = { ...payrollRecords };
                let changed = false;
                const monthKey = customRange ? `${startDateStr}_${endDateStr}` : selectedMonth;

                employees.forEach(emp => {
                    const totals = days.reduce((acc, date) => {
                        const rec = (attendanceLog[date] && attendanceLog[date][emp.id]);
                        acc.late += (rec?.lateDeduction || 0);
                        acc.early += (rec?.earlyDeduction || 0);
                        return acc;
                    }, { late: 0, early: 0 });

                    if (!updatedRecords[monthKey]) updatedRecords[monthKey] = {};
                    if (!updatedRecords[monthKey][emp.id]) {
                        const insuranceRecord = (insuranceRecords && insuranceRecords[emp.id]) || {};
                        const insuranceDeduction = insuranceRecord.status === 'مؤمن عليه' ? parseFloat(insuranceRecord.employeeAmount || 0) : 0;

                        updatedRecords[monthKey][emp.id] = {
                            basicSalary: emp.salary || 0,
                            grossSalary: emp.salary || 0,
                            mobileAllowance: 0,
                            transportAllowance: 0,
                            overtimeAllowance: 0,
                            insuranceDeduction: insuranceDeduction,
                            leaveCount: 0, leaveVal: 0,
                            penaltyCount: 0, penaltyVal: 0,
                            absenceCount: 0, absenceVal: 0,
                            lateCount: totals.late, lateVal: totals.late * ((emp.salary || 0) / 30 / 8),
                            earlyCount: totals.early, earlyVal: totals.early * ((emp.salary || 0) / 30 / 8),
                            advanceInstallment: 0, advanceTotal: 0,
                            adjDeduction: 0, adjAddition: 0,
                            notes: '',
                            settlements: []
                        };
                        changed = true;
                    } else if (updatedRecords[monthKey][emp.id].lateCount !== totals.late || updatedRecords[monthKey][emp.id].earlyCount !== totals.early) {
                        updatedRecords[monthKey][emp.id].lateCount = totals.late;
                        updatedRecords[monthKey][emp.id].earlyCount = totals.early;
                        const baseForLate = updatedRecords[monthKey][emp.id].basicSalary || updatedRecords[monthKey][emp.id].grossSalary || 0;
                        updatedRecords[monthKey][emp.id].lateVal = totals.late * (baseForLate / 30 / 8);
                        updatedRecords[monthKey][emp.id].earlyVal = totals.early * (baseForLate / 30 / 8);
                        changed = true;
                    }
                });

                if (changed) setPayrollRecords(updatedRecords);
            }, [selectedMonth, employees, attendanceLog, customRange, startDateStr, endDateStr, insuranceRecords]);

            const currentMonthKey = customRange ? `${startDateStr}_${endDateStr}` : selectedMonth;

            const updateField = (empId, field, value) => {
                const monthKey = customRange ? `${startDateStr}_${endDateStr}` : selectedMonth;
                const monthRecords = payrollRecords[monthKey] || {};
                const current = monthRecords[empId] || {
                    basicSalary: 0,
                    mobileAllowance: 0,
                    transportAllowance: 0,
                    overtimeAllowance: 0,
                    grossSalary: 0,
                    leaveCount: 0, leaveVal: 0,
                    penaltyCount: 0, penaltyVal: 0,
                    absenceCount: 0, absenceVal: 0,
                    lateCount: 0, lateVal: 0,
                    advanceInstallment: 0, advanceTotal: 0,
                    adjDeduction: 0, adjAddition: 0,
                    notes: '',
                    settlements: []
                };
                
                const updated = { ...current, [field]: value };
                
                if (field !== 'settlements' && field !== 'notes') {
                    const numVal = parseFloat(value) || 0;
                    updated[field] = numVal;

                    // Recalculate Gross Salary if any component changes
                    if (['basicSalary', 'mobileAllowance', 'transportAllowance', 'overtimeAllowance'].includes(field)) {
                        updated.grossSalary = (updated.basicSalary || 0) + (updated.mobileAllowance || 0) + (updated.transportAllowance || 0) + (updated.overtimeAllowance || 0);
                    }

                    const dayRate = (updated.grossSalary || 0) / 30;
                    const basicDayRate = (updated.basicSalary || 0) / 30;
                    
                    // Manual override requested for all deductions
                    if (field === 'leaveCount' || field === 'basicSalary' || field === 'mobileAllowance' || field === 'transportAllowance' || field === 'overtimeAllowance') updated.leaveVal = (updated.leaveCount || 0) * dayRate;
                    if (field === 'absenceCount' || field === 'basicSalary' || field === 'mobileAllowance' || field === 'transportAllowance' || field === 'overtimeAllowance') updated.absenceVal = (updated.absenceCount || 0) * dayRate;
                    if (field === 'penaltyCount' || field === 'basicSalary' || field === 'mobileAllowance' || field === 'transportAllowance' || field === 'overtimeAllowance') updated.penaltyVal = (updated.penaltyCount || 0) * dayRate;
                    if (field === 'lateCount' || field === 'basicSalary') updated.lateVal = (updated.lateCount || 0) * (basicDayRate / 8);
                    if (field === 'earlyCount' || field === 'basicSalary') updated.earlyVal = (updated.earlyCount || 0) * (basicDayRate / 8);
                }

                setPayrollRecords(prev => ({
                    ...prev,
                    [monthKey]: { ...monthRecords, [empId]: updated }
                }));
            };

            const calculateTotals = (record) => {
                const r = record || {};
                const totalDeductions = (r.leaveVal || 0) + (r.penaltyVal || 0) + (r.absenceVal || 0) + (r.lateVal || 0) + (r.earlyVal || 0) + (r.advanceInstallment || 0) + (r.adjDeduction || 0) + (r.insuranceDeduction || 0);
                const netSalary = (r.grossSalary || 0) + (r.adjAddition || 0) - totalDeductions;
                return { totalDeductions, netSalary };
            };

            const handleSaveSettlements = (data) => {
                updateField(settlementTarget.emp.id, 'settlements', data.settlements);
                updateField(settlementTarget.emp.id, 'adjAddition', data.adjAddition);
                updateField(settlementTarget.emp.id, 'adjDeduction', data.adjDeduction);
                setSettlementTarget(null);
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    {settlementTarget && (
                        <SettlementModal 
                            emp={settlementTarget.emp} 
                            month={currentMonthKey} 
                            record={settlementTarget.record} 
                            onSave={handleSaveSettlements}
                            onClose={() => setSettlementTarget(null)}
                        />
                    )}

                    {payslipTarget && (
                        <PayslipModal 
                            emp={payslipTarget.emp}
                            month={currentMonthKey}
                            record={payslipTarget.record}
                            onClose={() => setPayslipTarget(null)}
                        />
                    )}
                    
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 no-print">
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className="p-3 bg-white text-slate-400 rounded-2xl border border-slate-100 shadow-sm hover:bg-indigo-600 hover:text-white transition-all"
                                title="العودة للرئيسية"
                            >
                                <Icon name="arrow-right" size={20} />
                            </button>
                            <div>
                                <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                                    <Icon name="banknote" className="text-emerald-600" size={32} /> كشف الرواتب الشهري
                                </h2>
                                <p className="text-slate-500 font-bold tracking-wide text-xs">إدارة المستحقات، الاستقطاعات، والتسويات المالية لكل موظف</p>
                            </div>
                        </div>
                        <div className="flex flex-col sm:flex-row flex-wrap items-start sm:items-center gap-3 w-full md:w-auto">
                            <div className="relative no-print w-full sm:w-auto">
                                <Icon name="search" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text" 
                                    placeholder="بحث بالاسم أو الكود..." 
                                    className="w-full sm:w-auto bg-white border border-slate-100 rounded-2xl py-2 pr-10 pl-4 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all md:w-64"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            
                            <div className="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
                                <button 
                                    onClick={() => setCustomRange(!customRange)} 
                                    className={`px-3 py-1.5 rounded-xl text-[10px] font-black transition-all ${customRange ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                                >
                                    {customRange ? 'فترة مخصصة' : 'دورة شهرية'}
                                </button>
                                
                                {!customRange ? (
                                    <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="outline-none font-bold text-slate-700 bg-transparent text-sm px-2" />
                                ) : (
                                    <div className="flex items-center gap-2 px-2">

                if (!selectedEmp) return showToast('برجاء اختيار موظف أولاً', 'error');

                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const newFile = {
                        id: Date.now().toString(),
                        name: file.name,
                        type: file.type,
                        date: new Date().toISOString().split('T')[0],
                        data: evt.target.result
                    };
                    setFiles(prev => ({
                        ...prev,
                        [selectedEmp]: [...(prev[selectedEmp] || []), newFile]
                    }));

                reader.readAsDataURL(file);

                askConfirm('حذف الملف؟', 'هل أنت متأكد من حذف هذا الملف؟ لا يمكن التراجع عن هذه الخطوة.', () => {
                    setFiles(prev => ({

                        [empId]: prev[empId].filter(f => f.id !== fileId)

            );
        };

        const Settings = ({ appData, onRestore, onClear, shifts, setShifts, showToast, askConfirm }) => {
            const fileInputRef = useRef(null);
            const [showShiftModal, setShowShiftModal] = useState(false);
            const [editingShift, setEditingShift] = useState(null);
            const [shiftForm, setShiftForm] = useState({ name: '', start: '09:00', end: '17:00' });
            const [localBackups, setLocalBackups] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem('hr_backups');
                if (saved) {
                    try {
                        setLocalBackups(JSON.parse(saved).sort((a, b) => b.timestamp - a.timestamp));
                    } catch (e) {
                        setLocalBackups([]);
                    }
                }
            }, []);

            const handleBackup = () => {
                const dataStr = JSON.stringify(appData, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `HR_Coordinator_Backup_${new Date().toISOString().slice(0, 10)}.json`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const handleRestore = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        askConfirm('استعادة البيانات؟', 'هل أنت متأكد من استعادة البيانات؟ سيؤدي ذلك إلى استبدال كافة البيانات الحالية.', () => {
                            onRestore(json);
                            showToast('تمت استعادة البيانات بنجاح!');
                        });
                    } catch (err) {
                        showToast('خطأ في ملف النسخة الاحتياطية. يرجى التأكد من صحة الملف.', 'error');
                    }
                };
                reader.readAsText(file);
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const handleSaveShift = (e) => {
                e.preventDefault();
                const newShifts = { ...shifts };
                if (editingShift) {
                    newShifts[editingShift] = { ...newShifts[editingShift], ...shiftForm };
                } else {
                    const id = Date.now().toString();
                    newShifts[id] = { id, ...shiftForm };
                }
                setShifts(newShifts);
                setShowShiftModal(false);
                setEditingShift(null);
                setShiftForm({ name: '', start: '09:00', end: '17:00' });
            };

            const deleteShift = (id) => {
                if (Object.keys(shifts).length <= 1) {
                    showToast('يجب أن يكون هناك وردية واحدة على الأقل في النظام.', 'error');
                    return;
                }
                askConfirm('حذف الوردية؟', 'هل أنت متأكد من حذف هذه الوردية؟', () => {
                    const newShifts = { ...shifts };
                    delete newShifts[id];
                    setShifts(newShifts);
                    showToast('تم حذف الوردية بنجاح');

                    <div className="bg-white rounded-[40px] p-10 border border-slate-100 shadow-xl space-y-10">
                        {/* Shifts Management */}

                                </div>
                                <button 
                                    onClick={() => { setEditingShift(null); setShiftForm({ name: '', start: '09:00', end: '17:00' }); setShowShiftModal(true); }}

                                            <p className="text-xs font-bold text-slate-400">{shift.start} - {shift.end}</p>

                                            >
                                                <Icon name="edit" size={16} />
                                            </button>
                                            <button 
                                                onClick={() => deleteShift(shift.id)}

                                                <Icon name="trash-2" size={16} />
                                            </button>
                                        </div>
                                    </div>

                                                            showToast('تمت استعادة النسخة التلقائية بنجاح!');

                                                        showToast('تم حذف النسخة الاحتياطية', 'warning');

                                                    <Icon name="trash-2" size={16} />
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-slate-50/50 rounded-[30px] p-8 border border-slate-100">

                                    <span className="text-lg font-black text-slate-700">تحميل نسخة (Backup)</span>
                                </button>

                                <button

                                    <span className="text-lg font-black text-slate-700">استعادة (Restore)</span>
                                    <input

                                        ref={fileInputRef} 
                                        onChange={handleRestore} 
                                        accept=".json" 
                                        className="hidden" 
                                    />
                                </button>
                            </div>
                        </div>

                        <div className="pt-6 border-t border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-2 text-emerald-600">
                                <Icon name="shield-check" size={18} />
                                <span className="text-xs font-black">النظام محدث ومؤمن بالكامل</span>
                            </div>
                            <div className="text-[10px] font-bold text-slate-300 uppercase tracking-widest">
                                إصدار النظام v2.7.0 - TIBA COORDINATOR
                            </div>
                        </div>
                    </div>

                    <div className="bg-amber-50 rounded-[30px] p-6 border border-amber-100 flex gap-4 items-start">
                        <Icon name="alert-circle" className="text-amber-500 shrink-0" size={20} />
                        <p className="text-xs font-bold text-amber-700 leading-relaxed">

                        </p>
                    </div>
                </div>
            );
        };

        const Calendar = ({ employees, calendarEvents, setCalendarEvents, showToast }) => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [eventForm, setEventForm] = useState({ title: 'Sprint Review', date: new Date().toISOString().split('T')[0], type: 'MEETING' });
            const [deleteConfirmId, setDeleteConfirmId] = useState(null);

            const daysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const firstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const prevMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            const nextMonth = () => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            const goToToday = () => setCurrentDate(new Date());

            const monthNames = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            const dayNames = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];

            const calendarDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysCount = daysInMonth(year, month);
                const firstDay = firstDayOfMonth(year, month);
                const offset = (firstDay + 1) % 7;
                const days = [];
                const prevMonthDaysCount = daysInMonth(year, month - 1);
                for (let i = offset - 1; i >= 0; i--) {
                    days.push({ day: prevMonthDaysCount - i, month: month - 1, year, current: false });
                }
                for (let i = 1; i <= daysCount; i++) {
                    days.push({ day: i, month, year, current: true });
                }
                const remaining = 42 - days.length;
                for (let i = 1; i <= remaining; i++) {
                    days.push({ day: i, month: month + 1, year, current: false });
                }
                return days;
            }, [currentDate]);

            const handleSubmit = () => {
                if (!eventForm.title) return;
                if (editingId) {
                    setCalendarEvents(calendarEvents.map(e => e.id === editingId ? { ...eventForm, id: editingId } : e));
                    setEditingId(null);
                } else {
                    setCalendarEvents([...calendarEvents, { ...eventForm, id: Date.now() }]);
                }
                setEventForm({ title: '', date: new Date().toISOString().split('T')[0], type: 'MEETING' });
                setShowAddModal(false);
            };

            const confirmDelete = () => {
                if (deleteConfirmId === 'all') {
                    setCalendarEvents([]);
                } else {
                    setCalendarEvents(calendarEvents.filter(e => e.id !== deleteConfirmId));
                }
                setDeleteConfirmId(null);
            };

            const startEdit = (event) => {
                setEventForm({ title: event.title, date: event.date, type: event.type });
                setEditingId(event.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const getEventsForDay = (day, month, year) => {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                return calendarEvents.filter(e => e.date === dateStr);
            };

            const eventColors = {
                'MEETING': 'bg-blue-200 text-blue-800 border-blue-300',
                'HOLIDAY': 'bg-emerald-200 text-emerald-800 border-emerald-300',
                'EVENT': 'bg-sky-200 text-sky-800 border-sky-300',
                'LEAVE': 'bg-indigo-100 text-indigo-700 border-indigo-200',
                'OTHER': 'bg-orange-200 text-orange-800 border-orange-300'
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">

                            <Icon name="calendar" className="text-indigo-600" size={32} /> التقويم الحالي

                        <div className="flex gap-2">

                                <Icon name="trash-2" size={18} /> مسح الكل
                            </button>

                                    إلغاء التعديل
                                </button>

                            </button>
                        </div>
                    </div>

                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">التاريخ</label>
                                <div className="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                    <Icon name="calendar" className="text-slate-400" size={20} />
                                    <input type="date" value={eventForm.date} onChange={e => setEventForm({...eventForm, date: e.target.value})} className="bg-transparent outline-none font-bold text-slate-700 w-full" />
                                </div>
                            </div>
                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">العنوان</label>
                                <input type="text" value={eventForm.title} onChange={e => setEventForm({...eventForm, title: e.target.value})} className="w-full bg-slate-50 p-3 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700" placeholder="Sprint Review" />
                            </div>
                            <div className="flex-1 space-y-2">
                                <label className="text-xs font-black text-slate-400 uppercase">النوع</label>
                                <select value={eventForm.type} onChange={e => setEventForm({...eventForm, type: e.target.value})} className="w-full bg-slate-50 p-3 rounded-2xl border border-slate-100 outline-none font-bold text-slate-700 appearance-none">
                                    <option value="MEETING">اجتماع</option>
                                    <option value="HOLIDAY">إجازة رسمية</option>
                                    <option value="EVENT">فعالية</option>
                                    <option value="LEAVE">إجازة موظف</option>
                                    <option value="OTHER">أخرى</option>

                            </div>
                            <button onClick={handleSubmit} className={`${editingId ? 'bg-amber-500' : 'bg-indigo-600'} text-white px-8 py-3.5 rounded-2xl font-black shadow-lg hover:opacity-90 transition-all flex items-center gap-2`}>
                                <Icon name={editingId ? "save" : "plus"} size={20} /> {editingId ? 'حفظ التعديلات' : 'إضافة للتقويم'}
                            </button>
                        </div>

                        <div className="border rounded-2xl overflow-hidden">
                            <div className="bg-slate-400 p-4 flex justify-between items-center text-white">
                                <div className="flex gap-2">
                                    <button onClick={prevMonth} className="p-1 hover:bg-white/20 rounded">{'<<'}</button>
                                    <button onClick={prevMonth} className="p-1 hover:bg-white/20 rounded">{'<'}</button>
                                </div>
                                <h3 className="text-xl font-black cursor-pointer" onClick={goToToday}>
                                    {monthNames[currentDate.getMonth()]} {currentDate.getFullYear()} (اضغط للعودة للشهر الحالي)
                                </h3>
                                <div className="flex gap-2">
                                    <button onClick={nextMonth} className="p-1 hover:bg-white/20 rounded">{'>'}</button>
                                    <button onClick={nextMonth} className="p-1 hover:bg-white/20 rounded">{'>>'}</button>
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-7 bg-slate-200 gap-px">
                                {dayNames.map(d => (
                                    <div key={d} className="bg-slate-300 p-2 text-center font-black text-slate-600 text-sm">{d}</div>
                                ))}
                                {calendarDays.map((d, i) => {
                                    const events = getEventsForDay(d.day, d.month, d.year);
                                    return (
                                        <div key={i} className={`min-h-[140px] p-2 bg-white border-slate-100 border-r border-b ${!d.current ? 'bg-slate-50/50 grayscale opacity-50' : ''}`}>

                                                <span className={`text-sm font-black ${d.current ? 'text-slate-700' : 'text-slate-400'}`}>{d.day}</span>

                                                                <Icon name="edit" size={10} />
                                                            </button>

                                                                <Icon name="trash-2" size={10} />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                    {deleteConfirmId && (

                                    <Icon name="alert-triangle" size={40} />

                                <h3 className="text-2xl font-black text-slate-800 mb-2">تأكيد الحذف</h3>
                                <p className="text-slate-500 font-bold mb-8">
                                    {deleteConfirmId === 'all' ? 'هل أنت متأكد من مسح كافة المواعيد والفعاليات من التقويم؟' : 'هل أنت متأكد من حذف هذا الحدث نهائياً؟'}

                                </div>

        const Archive = ({ employees, showToast }) => {

                    </div>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 no-print">

                            <p className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">متابعة الوثائق المكتملة لكل موظف</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center w-full md:w-auto">
                            <div className="relative w-full sm:w-auto">
                                <Icon name="search" size={16} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input 
                                    type="text"

                                    className="w-full sm:w-auto bg-white border border-slate-200 rounded-2xl py-2 pr-10 pl-4 text-xs font-bold outline-none focus:ring-2 focus:ring-amber-500/20 transition-all md:w-64"

            const [editingEmp, setEditingEmp] = useState(null);
            const [viewingEmp, setViewingEmp] = useState(null);
            const [warningEmp, setWarningEmp] = useState(null);
            const [selectedDept, setSelectedDept] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [isTableLoading, setIsTableLoading] = useState(false);
            const fileInputRef = useRef(null);
            const [formData, setFormData] = useState({ name: '', code: '', joinDate: '', department: '', jobTitle: '', nationalId: '', phone: '', address: '', shift: Object.values(shifts)[0]?.name || '' });
            
            const departmentsList = useMemo(() => ['all', ...new Set(employees.map(e => e.department).filter(Boolean))], [employees]);
            
            const filteredEmployees = useMemo(() => {
                let filtered = selectedDept === 'all' ? employees : employees.filter(e => e.department === selectedDept);
                if (searchQuery) {
                    const q = searchQuery.toLowerCase().trim();
                    filtered = filtered.filter(e => 
                        e.name.toLowerCase().includes(q) || 
                        e.code.toString().includes(q) ||
                        e.department.toLowerCase().includes(q) ||
                        e.jobTitle.toLowerCase().includes(q)
                    );
                }
                return filtered;
            }, [employees, selectedDept, searchQuery]);

            // Simulate small delay for search to show loading feel
            useEffect(() => {
                if (searchQuery) {
                    setIsTableLoading(true);
                    const timer = setTimeout(() => setIsTableLoading(false), 300);
                    return () => clearTimeout(timer);
                }
            }, [searchQuery]);
            const normalizeText = (t) => t ? t.toString().trim().replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي').replace(/\s+/g, ' ') : "";
            const handleExcelUpload = (e) => { 
                const file = e.target.files[0]; 
                if (!file) return; 
                const reader = new FileReader(); 
                reader.onload = (evt) => { 
                    const bstr = evt.target.result; 
                    const wb = XLSX.read(bstr, { type: 'binary', cellDates: true }); 
                    const ws = wb.Sheets[wb.SheetNames[0]]; 
                    const rows = XLSX.utils.sheet_to_json(ws, { header: 1 }); 
                    if (rows.length < 2) return showToast("الملف فارغ تماماً.", "error"); 
                    
                    // Find the header row (first row that contains 'اسم' or 'كود')
                    let headerIdx = 0;
                    for (let i = 0; i < Math.min(rows.length, 10); i++) {
                        const rowStr = rows[i].map(c => normalizeText(c)).join(' ');
                        if (rowStr.includes('اسم') || rowStr.includes('كود')) {
                            headerIdx = i;
                            break;
                        }
                    }

                    const headers = rows[headerIdx].map(h => normalizeText(h)); 
                    const f = (k, df) => { 
                        const idx = headers.findIndex(h => k.some(ki => h.includes(normalizeText(ki)))); 
                        return idx !== -1 ? idx : df; 
                    }; 
                    const m = { 
                        code: f(['كود', 'بصمه'], 1), 
                        joinDate: f(['تاريخ', 'تعيين'], 2), 
                        name: f(['اسم'], 3), 
                        department: f(['قسم', 'اداره'], 4), 
                        jobTitle: f(['مسمي'], 5), 
                        nationalId: f(['قومي'], 6), 
                        phone: f(['هاتف'], 7), 
                        address: f(['عنوان'], 8), 
                        shift: f(['ورديه', 'شفت'], 9) 
                    }; 
                    const res = rows.slice(headerIdx + 1).map(r => {
                        let joinDate = '';
                        const rawDate = r[m.joinDate];
                        if (rawDate instanceof Date) {
                            joinDate = rawDate.toISOString().split('T')[0];
                        } else if (rawDate) {
                            const d = new Date(rawDate);
                            if (!isNaN(d.getTime())) {
                                joinDate = d.toISOString().split('T')[0];
                            } else {
                                joinDate = rawDate.toString();
                            }
                        }
                        return { 
                            id: Math.random().toString(36).substr(2, 9), 
                            code: r[m.code]?.toString() || '', 
                            joinDate: joinDate, 
                            name: r[m.name]?.toString() || '', 
                            department: r[m.department]?.toString() || '', 
                            jobTitle: r[m.jobTitle]?.toString() || '', 
                            nationalId: r[m.nationalId]?.toString() || '', 
                            phone: r[m.phone]?.toString() || '', 
                            address: r[m.address]?.toString() || '', 
                            shift: r[m.shift]?.toString() || Object.values(shifts)[0]?.name || '', 
                            status: 'نشط', 
                            totalLeaves: 21, 
                            monthlyLeaves: Array(12).fill(0) 
                        };
                    }).filter(emp => {
                        if (!emp.name || !emp.code) return false;
                        const n = normalizeText(emp.name);
                        const c = normalizeText(emp.code);
                        // Skip if it looks like a header
                        if (n.includes('اسم') || n.includes('كامل') || n.includes('موظف')) return false;
                        if (c.includes('كود') || c.includes('بصمه') || c.includes('رقم')) return false;
                        if (n.includes('تاريخ') || n.includes('تعيين')) return false;
                        return true;
                    }); 
                    if (res.length) { 
                        onBulkAdd(res); 
                        showToast(`تم استيراد بيانات ${res.length} موظف بنجاح.`); 
                    } 
                }; 
                reader.readAsBinaryString(file); 
                e.target.value = null; 
            };
            const handleSubmit = (e) => { e.preventDefault(); editingEmp ? onUpdateEmployee({ ...formData, id: editingEmp.id }) : onAddEmployee(formData); setShowModal(false); };

                        <div>
                            <h2 className="text-3xl sm:text-4xl font-black text-slate-800 tracking-tighter">فريق العمل</h2>
                            <p className="text-slate-500 font-bold mt-1">إدارة بيانات الكادر البشري والملفات الوظيفية</p>
                        </div>
                        <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                            <button 
                                onClick={() => window.print()} 
                                className="flex-1 sm:flex-none justify-center px-6 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-xl bg-white text-slate-700 border border-slate-100 hover:bg-slate-50 transition-all active:scale-95"
                            >
                                <Icon name="printer" size={20} />
                                طباعة القائمة
                            </button>
                            <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls" onChange={handleExcelUpload} />
                            <button 
                                onClick={() => fileInputRef.current.click()} 
                                className="flex-1 sm:flex-none justify-center px-6 py-3.5 rounded-2xl font-black flex items-center gap-2 shadow-xl bg-emerald-50 text-emerald-700 border border-emerald-100 hover:bg-emerald-100 transition-all active:scale-95"
                            >
                                <Icon name="file-spreadsheet" size={20} /> 
                                استيراد Excel
                            </button>
                            <button 
                                onClick={() => { 
                                    setEditingEmp(null); 
                                    setFormData({ name: '', code: '', joinDate: '', department: '', jobTitle: '', nationalId: '', phone: '', address: '', shift: Object.values(shifts)[0]?.name || '' }); 
                                    setShowModal(true); 
                                }} 
                                className="w-full sm:w-auto justify-center bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black flex items-center gap-2 shadow-2xl shadow-indigo-500/20 hover:bg-indigo-700 transition-all hover:scale-105 active:scale-95"
                            >
                                <Icon name="plus" size={22} /> 
                                إضافة موظف جديد
                            </button>
                        </div>
                    </div>

                    {/* Filters and Search */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 no-print">
                        <div className="md:col-span-2 relative group">
                            <Icon name="search" size={22} className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors" />
                            <input 
                                type="text" 
                                placeholder="ابحث بالاسم، الكود، القسم، أو المسمى الوظيفي..." 
                                className="w-full bg-white border-2 border-slate-100 rounded-[25px] py-4 pr-14 pl-6 text-base font-bold outline-none focus:border-indigo-500/30 focus:ring-4 focus:ring-indigo-500/5 transition-all shadow-sm"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>
                        <div className="relative">
                            <Icon name="filter" size={18} className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400" />
                            <select 
                                value={selectedDept} 
                                onChange={(e) => setSelectedDept(e.target.value)} 
                                className="w-full pr-12 pl-6 py-4 rounded-[25px] border-2 font-bold focus:outline-none bg-white border-slate-100 text-slate-700 appearance-none cursor-pointer focus:border-indigo-500/30 shadow-sm"
                            >
                                <option value="all">كافة الأقسام والإدارات</option>
                                {departmentsList.filter(d => d !== 'all').map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* Table Section */}
                    <div className={`rounded-[45px] shadow-[0_20px_60px_rgba(0,0,0,0.04)] overflow-hidden border bg-white border-slate-100 ${warningEmp ? 'print:hidden' : ''}`}>
                        <div className="overflow-x-auto">
                            <table className="w-full text-right border-collapse">
                                <thead className="bg-slate-50/50 text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] border-b border-slate-100">
                                    <tr>
                                        <th className="px-6 py-6">م</th>
                                        <th className="px-6 py-6">الكود</th>
                                        <th className="px-6 py-6">تاريخ التعيين</th>
                                        <th className="px-8 py-6">الاسم الكامل</th>
                                        <th className="px-6 py-6">الإدارة</th>
                                        <th className="px-6 py-6">المسمى الوظيفي</th>
                                        <th className="px-6 py-6">الوردية</th>
                                        <th className="px-8 py-6">الرقم القومي</th>
                                        <th className="px-6 py-6 text-center">الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {isTableLoading ? (
                                        <tr>
                                            <td colSpan="9" className="px-6 py-32 text-center">
                                                <div className="flex flex-col items-center gap-6">
                                                    <div className="w-14 h-14 border-4 border-indigo-500/10 border-t-indigo-500 rounded-full animate-spin"></div>
                                                    <p className="text-slate-400 font-black text-lg animate-pulse tracking-tighter">جاري تحديث البيانات...</p>
                                                </div>
                                            </td>
                                        </tr>
                                    ) : filteredEmployees.length ? filteredEmployees.map((emp, index) => (
                                        <tr key={emp.id} className="hover:bg-indigo-50/30 transition-all group">
                                            <td className="px-6 py-5 font-bold text-slate-400 text-xs">{index + 1}</td>
                                            <td className="px-6 py-5">
                                                <span className="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-mono font-black text-sm border border-indigo-100/50">{emp.code}</span>
                                            </td>
                                            <td className="px-6 py-5 text-xs font-bold text-slate-500">{emp.joinDate}</td>
                                            <td className="px-8 py-5">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center text-slate-400 font-black text-xs group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                                        {emp.name.substring(0, 1)}
                                                    </div>
                                                    <span className="font-black text-base text-slate-800 group-hover:text-indigo-600 transition-colors">{emp.name}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <span className="text-sm font-bold text-slate-500 bg-slate-50 px-3 py-1 rounded-lg">{emp.department}</span>
                                            </td>
                                            <td className="px-6 py-5 text-sm font-bold text-slate-500">{emp.jobTitle}</td>
                                            <td className="px-6 py-5">
                                                <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">{emp.shift || '---'}</span>
                                            </td>
                                            <td className="px-8 py-5 font-mono text-xs text-slate-400">{emp.nationalId}</td>
                                            <td className="px-6 py-5 text-center">
                                                <div className="flex justify-center items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => setViewingEmp(emp)} className="p-2.5 rounded-xl bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all shadow-sm" title="عرض الملف الشخصي"><Icon name="user" size={18} /></button>
                                                    <button onClick={() => setWarningEmp(emp)} className="p-2.5 rounded-xl bg-amber-50 text-amber-600 hover:bg-amber-600 hover:text-white transition-all shadow-sm" title="إنذار / ملاحظة"><Icon name="alert-triangle" size={18} /></button>
                                                    <button onClick={() => { setEditingEmp(emp); setFormData({ ...emp }); setShowModal(true); }} className="p-2.5 rounded-xl bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all shadow-sm" title="تعديل"><Icon name="edit" size={18} /></button>
                                                    <button onClick={() => { askConfirm('حذف الموظف؟', `هل أنت متأكد من حذف الموظف ${emp.name}؟`, () => onDeleteEmployee(emp.id)); }} className="p-2.5 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white transition-all shadow-sm" title="حذف"><Icon name="trash-2" size={18} /></button>
                                                </div>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr>
                                            <td colSpan="9" className="px-6 py-24 text-center">
                                                <div className="flex flex-col items-center gap-4 opacity-30">
                                                    <Icon name="users" size={64} />
                                                    <p className="text-xl font-black italic">لا توجد نتائج تطابق بحثك</p>
                                                </div>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    {showModal && (<div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-0 sm:p-6 overflow-y-auto"><div className="my-auto w-full max-w-4xl p-6 sm:p-10 rounded-none sm:rounded-[50px] shadow-2xl animate-fade-in border bg-white border-slate-200 min-h-screen sm:min-h-0"><div className="flex justify-between items-center mb-8"><h3 className="text-2xl sm:text-3xl font-black text-slate-800">{editingEmp ? 'تعديل بيانات الموظف' : 'إضافة موظف جديد'}</h3><button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-rose-500"><Icon name="x" size={32} /></button></div><form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الاسم الكامل</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الكود الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.code} onChange={(e) => setFormData({...formData, code: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">تاريخ التعيين</label><input required type="date" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.joinDate} onChange={(e) => setFormData({...formData, joinDate: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الإدارة</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">المسمى الوظيفي</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.jobTitle} onChange={(e) => setFormData({...formData, jobTitle: e.target.value})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الرقم القومي</label><input required type="text" pattern="\d{14}" title="يجب إدخال 14 رقم" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.nationalId} onChange={(e) => setFormData({...formData, nationalId: e.target.value.replace(/\D/g, '')})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">رقم الهاتف</label><input required type="tel" pattern="01[0125]\d{8}" title="يجب إدخال رقم هاتف مصري صحيح" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value.replace(/[^\d+]/g, '')})} /></div><div className="space-y-1"><label className="text-xs font-black text-slate-500 uppercase">الوردية</label><select required className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.shift} onChange={(e) => setFormData({...formData, shift: e.target.value})}>{Object.values(shifts).map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select></div><div className="md:col-span-2 space-y-1"><label className="text-xs font-black text-slate-500 uppercase">العنوان السكني</label><input required type="text" className="w-full px-5 py-3 rounded-2xl border outline-none font-bold bg-slate-50 border-slate-100 text-slate-800" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} /></div><div className="md:col-span-3 pt-6"><button type="submit" className="w-full bg-indigo-600 text-white font-black py-4 rounded-3xl text-xl shadow-xl hover:bg-indigo-700 transition-all">حفظ البيانات</button></div></form></div></div>)}
                    {viewingEmp && <EmployeeProfile employee={viewingEmp} employees={employees} onClose={() => setViewingEmp(null)} />}
                    {warningEmp && <WarningModal emp={warningEmp} onClose={() => setWarningEmp(null)} />}
                </div>
            );
        };

        const Recruitment = ({ employees, showToast, askConfirm }) => {
            const [activeSubTab, setActiveSubTab] = useState('board'); // 'board' or 'ats'
            const STAGES = [
                { id: 'applied', title: 'فرز السير الذاتية', color: 'border-slate-100' },
                { id: 'interview', title: 'المقابلات', color: 'border-blue-50' },
                { id: 'offer', title: 'العروض الوظيفية', color: 'border-emerald-50' },
                { id: 'rejected', title: 'مرفوض', color: 'border-rose-50' },
            ];

            const [candidates, setCandidates] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isOnline, setIsOnline] = useState(navigator.onLine);

            useEffect(() => {
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            const fetchCandidates = async () => {
                try {
                    const response = await fetch('/api/candidates');
                    const data = await response.json();
                    setCandidates(data);
                    localStorage.setItem('hr_candidates_cache', JSON.stringify(data));
                } catch (err) {
                    console.error('Failed to fetch candidates:', err);
                    const cached = localStorage.getItem('hr_candidates_cache');
                    if (cached) {
                        setCandidates(JSON.parse(cached));
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchCandidates();
            }, []);

            const [searchQuery, setSearchQuery] = useState('');
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingCandidate, setEditingCandidate] = useState(null);
            const [newCandidate, setNewCandidate] = useState({
                name: '',
                role: '',
                experience: '',
                priority: 'عادي'
            });

            const [pendingActions, setPendingActions] = useState(() => {
                const saved = localStorage.getItem('pending_candidates_actions');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                if (isOnline && pendingActions.length > 0) {
                    syncPendingActions();
                }
            }, [isOnline, pendingActions]);

            const syncPendingActions = async () => {
                const actions = [...pendingActions];
                const failed = [];
                
                for (const action of actions) {
                    try {
                        if (action.type === 'SAVE') {
                            await fetch('/api/candidates', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(action.data)
                            });
                        } else if (action.type === 'DELETE') {
                            await fetch(`/api/candidates/${action.id}`, { method: 'DELETE' });
                        }
                    } catch (err) {
                        failed.push(action);
                    }
                }
                
                setPendingActions(failed);
                localStorage.setItem('pending_candidates_actions', JSON.stringify(failed));
                if (failed.length === 0) {
                    fetchCandidates();
                }
            };

            const handleAddCandidate = async (e) => {
                e.preventDefault();
                const candidate = {
                    id: Date.now().toString(),
                    ...newCandidate,
                    email: '',
                    phone: '',
                    score: Math.floor(Math.random() * 30) + 60,
                    status: 'applied',
                    createdAt: Date.now(),
                    notes: ''
                };
                
                // Optimistic update
                setCandidates(prev => [candidate, ...prev]);
                setShowAddModal(false);
                setNewCandidate({ name: '', role: '', experience: '', priority: 'عادي' });

                try {
                    if (isOnline) {
                        await fetch('/api/candidates', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(candidate)
                        });
                    } else {
                        const newActions = [...pendingActions, { type: 'SAVE', data: candidate }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                } catch (err) {
                    const newActions = [...pendingActions, { type: 'SAVE', data: candidate }];
                    setPendingActions(newActions);
                    localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                }
            };

            const handleEditCandidate = async (e) => {
                e.preventDefault();
                if (!editingCandidate) return;
                
                // Optimistic update
                setCandidates(prev => prev.map(c => c.id === editingCandidate.id ? editingCandidate : c));
                setEditingCandidate(null);

                try {
                    if (isOnline) {
                        await fetch('/api/candidates', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(editingCandidate)
                        });
                    } else {
                        const newActions = [...pendingActions, { type: 'SAVE', data: editingCandidate }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                } catch (err) {
                    const newActions = [...pendingActions, { type: 'SAVE', data: editingCandidate }];
                    setPendingActions(newActions);
                    localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                }
            };

            const moveNext = async (id) => {
                const cand = candidates.find(c => c.id === id);
                if (!cand) return;
                
                const currentIndex = STAGES.findIndex(s => s.id === cand.status);
                if (currentIndex < STAGES.length - 1) {
                    const updatedCand = { ...cand, status: STAGES[currentIndex + 1].id };
                    
                    // Optimistic update
                    setCandidates(prev => prev.map(c => c.id === id ? updatedCand : c));

                    try {
                        if (isOnline) {
                            await fetch('/api/candidates', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(updatedCand)
                            });
                        } else {
                            const newActions = [...pendingActions, { type: 'SAVE', data: updatedCand }];
                            setPendingActions(newActions);
                            localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                        }
                    } catch (err) {
                        const newActions = [...pendingActions, { type: 'SAVE', data: updatedCand }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                }
            };

            const deleteCandidate = async (id) => {
                askConfirm('حذف المرشح؟', 'هل أنت متأكد من حذف هذا المرشح؟', async () => {
                    // Optimistic update
                    setCandidates(prev => prev.filter(c => c.id !== id));

                    try {
                        if (isOnline) {
                            await fetch(`/api/candidates/${id}`, { method: 'DELETE' });
                        } else {
                            const newActions = [...pendingActions, { type: 'DELETE', id }];
                            setPendingActions(newActions);
                            localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                        }
                    } catch (err) {
                        const newActions = [...pendingActions, { type: 'DELETE', id }];
                        setPendingActions(newActions);
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    }
                    showToast('تم حذف المرشح بنجاح');
                });
            };

            const stats = [
                { label: 'إجمالي المرشحين', value: candidates.length, icon: 'users', color: 'text-blue-600', bg: 'bg-blue-50' },
                { label: 'مقابلات نشطة', value: candidates.filter(c => c.status === 'interview').length, icon: 'calendar', color: 'text-purple-600', bg: 'bg-purple-50' },
                { label: 'عروض معلقة', value: candidates.filter(c => c.status === 'offer').length, icon: 'check-circle', color: 'text-emerald-600', bg: 'bg-emerald-50' },
            ];

            return (
                <div className="space-y-8 animate-fade-in no-print" dir="rtl">
                    {/* Header Section */}
                    <div className="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-8 bg-white p-8 rounded-[45px] border border-slate-50 shadow-[0_20px_60px_rgba(0,0,0,0.03)]">
                        <div className="flex items-center gap-6">
                            <div className="w-16 h-16 bg-indigo-600 rounded-[25px] flex items-center justify-center text-white shadow-2xl shadow-indigo-500/30 transform -rotate-3 hover:rotate-0 transition-transform duration-500">
                                <Icon name="briefcase" size={32} />
                            </div>
                            <div>
                                <h1 className="text-3xl sm:text-4xl font-black text-slate-800 tracking-tighter">إدارة التوظيف</h1>
                                <div className="flex items-center gap-3 mt-2">
                                    <div className={`flex items-center gap-2 px-3 py-1 rounded-full border ${isOnline ? 'bg-emerald-50 border-emerald-100 text-emerald-600' : 'bg-rose-50 border-rose-100 text-rose-600'}`}>
                                        <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}`}></div>
                                        <span className="text-[10px] font-black uppercase tracking-widest">
                                            {isOnline ? 'متصل بالخادم' : 'وضع الأوفلاين'}
                                        </span>
                                    </div>
                                    {pendingActions.length > 0 && (
                                        <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-amber-50 border border-amber-100 text-amber-600 animate-pulse">
                                            <Icon name="refresh-cw" size={10} className="animate-spin" />
                                            <span className="text-[10px] font-black uppercase tracking-widest">{pendingActions.length} عمليات معلقة</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-4 w-full lg:w-auto">
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
                                <button 
                                    onClick={() => setActiveSubTab('board')}
                                    className={`px-8 py-3 rounded-xl font-black transition-all duration-300 ${activeSubTab === 'board' ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    لوحة المتابعة
                                </button>
                                <button 
                                    onClick={() => setActiveSubTab('ats')}
                                    className={`px-8 py-3 rounded-xl font-black transition-all duration-300 ${activeSubTab === 'ats' ? 'bg-white text-indigo-600 shadow-xl' : 'text-slate-500 hover:text-slate-700'}`}
                                >
                                    نظام ATS الذكي
                                </button>
                            </div>
                            <button 
                                onClick={() => window.print()}

                        const content = e.target.result;
                        if (file.type === 'application/pdf') {
                            try {
                                const pdf = await pdfjsLib.getDocument({ data: content }).promise;
                                let text = '';
                                for (let i = 1; i <= pdf.numPages; i++) {
                                    const page = await pdf.getPage(i);
                                    const textContent = await page.getTextContent();
                                    // Improved text joining to prevent word breaking
                                    let lastY, textItems = [];
                                    for (let item of textContent.items) {
                                        if (lastY !== undefined && lastY !== item.transform[5]) {
                                            textItems.push('\n');
                                        }
                                        textItems.push(item.str);
                                        lastY = item.transform[5];
                                    }
                                    text += textItems.join(' ') + ' ';
                                }
                                resolve(text);
                            } catch (err) {
                                reject('خطأ في قراءة ملف PDF');
                            }
                        } else if (file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                            try {

                                resolve(result.value);
                            } catch (err) {
                                reject('خطأ في قراءة ملف Word');
                            }
                        } else {
                            resolve(new TextDecoder().decode(content));
                        }

                    2. ابحث عن هذه الكلمات في نص السيرة الذاتية بدقة، مع مراعاة المترادفات (مثلاً: "Graphic Design" هي نفسها "تصميم جرافيك").
                    3. لا تضع أي كلمة في "missingKeywords" إذا كانت موجودة بالفعل في السيرة الذاتية أو لها ذكر واضح.
                    4. تأكد أن "missingKeywords" هي كلمات "موجودة في الوصف الوظيفي" ولكنها "غائبة تماماً عن السيرة الذاتية".
                    
                    المطلوب هو إرجاع النتيجة بتنسيق JSON فقط كالتالي:
                    {
                        "score": (رقم من 0 إلى 100 يمثل نسبة التوافق الكلية),
                        "skillsScore": (رقم من 0 إلى 100 لتطابق المهارات),
                        "contextScore": (رقم من 0 إلى 100 للخبرة والكلمات المفتاحية),
                        "formattingScore": (رقم من 0 إلى 100 لجودة التنسيق),
                        "summary": (ملخص قصير جداً للمرشح),
                        "classification": ("قوي" أو "متوسط" أو "ضعيف"),
                        "name": (اسم المرشح من السيرة الذاتية),
                        "experience": (سنوات الخبرة المستخلصة، مثال: "5 سنوات"),
                        "email": (البريد الإلكتروني إن وجد),
                        "phone": (رقم الهاتف إن وجد),
                        "foundKeywords": [قائمة بالكلمات المفتاحية التي تم العثور عليها فعلياً في السيرة الذاتية بناءً على الوصف الوظيفي],
                        "missingKeywords": [قائمة بالكلمات المفتاحية الجوهرية المطلوبة في الوصف الوظيفي وغير موجودة تماماً في السيرة الذاتية],
                        "recommendations": [قائمة بنصائح محددة للمرشح لتحسين سيرته الذاتية لهذا المنصب]
                    }
                `;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    const textResponse = data.candidates[0].content.parts[0].text;
                    const jsonMatch = textResponse.match(/\{.*\}/s);
                    if (jsonMatch) {
                        return JSON.parse(jsonMatch[0]);
                    }
                    throw new Error('فشل في تحليل الرد');
                } catch (err) {
                    console.error(err);
                    return { 
                        score: 0, 
                        skillsScore: 0, 
                        contextScore: 0, 
                        formattingScore: 0, 
                        summary: 'خطأ في التحليل', 
                        classification: 'غير معروف', 
                        name: 'غير معروف',
                        experience: 'غير متوفر',
                        email: 'غير متوفر',

                        missingKeywords: [],

            const [selectedResult, setSelectedResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);

            const saveCandidate = async (res) => {
                setIsSaving(true);
                const candidateData = {

                    name: res.name,
                    role: jobDescription.substring(0, 50),

                    email: res.email,
                    phone: res.phone,
                    status: 'applied',
                    priority: res.score > 70 ? 'عالية' : 'متوسطة',

                    createdAt: Date.now(),
                    notes: res.summary

                try {
                    if (isOnline) {
                        const response = await fetch('/api/candidates', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(candidateData)
                        });
                        if (response.ok) {
                            showToast('تم حفظ المرشح في قاعدة البيانات بنجاح');
                            if (onCandidateSaved) onCandidateSaved();
                        }

                        const saved = localStorage.getItem('pending_candidates_actions');
                        const pendingActions = saved ? JSON.parse(saved) : [];
                        const newActions = [...pendingActions, { type: 'SAVE', data: candidateData }];
                        localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                        showToast('تم حفظ المرشح محلياً. ستتم المزامنة عند الاتصال بالإنترنت.', 'warning');
                        if (onCandidateSaved) onCandidateSaved();
                    }
                } catch (err) {
                    console.error(err);
                    const saved = localStorage.getItem('pending_candidates_actions');
                    const pendingActions = saved ? JSON.parse(saved) : [];
                    const newActions = [...pendingActions, { type: 'SAVE', data: candidateData }];
                    localStorage.setItem('pending_candidates_actions', JSON.stringify(newActions));
                    showToast('تم حفظ المرشح محلياً. ستتم المزامنة عند الاتصال بالإنترنت.', 'warning');

                    <div className="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">

                                <Icon name="search" size={22} className="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-500 transition-colors" />
                                <input

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="bg-white p-10 rounded-[45px] shadow-[0_20px_60px_rgba(0,0,0,0.03)] border border-slate-50 relative overflow-hidden group hover:shadow-[0_30px_80px_rgba(0,0,0,0.06)] transition-all">

                                <p className="text-6xl font-black text-slate-800 mt-4 relative z-10 tracking-tighter">{stats.total}</p>
                                <div className="mt-6 flex items-center gap-2 text-indigo-600 font-black text-xs relative z-10">
                                    <Icon name="file-text" size={14} />

                            <div className="bg-white p-10 rounded-[45px] shadow-[0_20px_60px_rgba(0,0,0,0.03)] border border-slate-50 relative overflow-hidden group hover:shadow-[0_30px_80px_rgba(0,0,0,0.06)] transition-all">
                                <div className="absolute top-0 right-0 w-40 h-40 bg-emerald-50/50 rounded-full -mr-20 -mt-20 transition-transform group-hover:scale-125 duration-700"></div>
                                <h4 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] relative z-10">متوسط التوافق</h4>

                                <div className="mt-6 flex items-center gap-2 text-emerald-600 font-black text-xs relative z-10">

            const addActivity = (message, type = 'info') => {
                const newActivity = { id: Date.now(), type, message, time: new Date().toISOString() };
                setRecentActivity(prev => [newActivity, ...prev].slice(0, 5));
            };

            useEffect(() => {
                localStorage.setItem('hr_activity', JSON.stringify(recentActivity));
            }, [recentActivity]);

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setNotifications(prev => [...prev, { id, message, type }]);

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null, type: 'danger' });
            const askConfirm = (title, message, onConfirm, type = 'danger') => {

            });
            const [resignations, setResignations] = useState(() => {

                return saved ? JSON.parse(saved) : [];
            });
            const [shifts, setShifts] = useState(() => {

                    ],
